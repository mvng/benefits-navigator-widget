  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

      --text-muted: #9a9082;
      --border: #e0d6c6;

    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--cream); color: var(--text-primary); }

      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeUp { animation: fadeUp 0.5s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: var(--jade); color: white; border: none; border-radius: 99px; padding: 14px 28px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-family: 'Plus Jakarta Sans', sans-serif; }
    .btn-primary:hover { background: var(--jade-light); }
    .btn-secondary { display: inline-flex; align-items: center; gap: 8px; background: transparent; color: var(--jade); border: 1.5px solid var(--jade); border-radius: 99px; padding: 13px 24px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-family: 'Plus Jakarta Sans', sans-serif; }
    .btn-secondary:hover { background: rgba(26,107,90,0.06); }
    .btn-ghost { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; padding: 8px 12px; border-radius: 6px; font-family: 'Plus Jakarta Sans', sans-serif; }
    .nav { position: sticky; top: 0; z-index: 100; background: rgba(250,246,239,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .nav-inner { max-width: 1120px; margin: 0 auto; height: 64px; display: flex; align-items: center; }
    .tag { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; }
    .tag-green { background: rgba(26,107,90,0.1); color: var(--jade-dark); }
    .tag-gray { background: var(--sand); color: var(--text-secondary); }
    .input { width: 100%; background: var(--warm-white); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 16px; font-size: 15px; color: var(--text-primary); font-family: 'Plus Jakarta Sans', sans-serif; outline: none; }
    .input:focus { border-color: var(--jade); box-shadow: 0 0 0 3px rgba(26,107,90,0.1); }
    .choice-card { border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.2s ease; background: var(--warm-white); display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 500; }
    .choice-card:hover { border-color: var(--jade); background: rgba(26,107,90,0.03); }
    .choice-card.selected { border-color: var(--jade); background: rgba(26,107,90,0.07); color: var(--jade-dark); }
    .choice-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

    .progress-track { width: 100%; height: 6px; background: var(--sand); border-radius: 99px; overflow: hidden; }

    .filter-btn { background: var(--warm-white); color: var(--text-secondary); border: 1px solid var(--border); padding: 8px 16px; border-radius: 99px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; }

    .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: var(--shadow-sm); }
    .card-hover { transition: all 0.2s ease; cursor: pointer; }
    .card-hover:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--jade); }
    .skip-link { position: absolute; top: -40px; left: 0; background: var(--jade); color: white; padding: 8px 16px; z-index: 9999; font-weight: 600; border-radius: 0 0 8px 0; transition: top 0.2s; }

    .income-toggle-btn { display: none; background: none; border: 1px solid rgba(26,107,90,0.2); border-radius: 6px; padding: 6px 12px; font-size: 12px; color: var(--jade); font-family: 'Plus Jakarta Sans', sans-serif; cursor: pointer; font-weight: 600; margin: 8px 0; width: 100%; }
    @media (max-width: 600px) {

      .income-table-mobile-open { display: block !important; }
      .results-grid { grid-template-columns: 1fr; }

    }
    @media print {
      .nav, .filter-buttons, .btn-primary, .btn-secondary, .btn-ghost, .disclaimer-box, .no-print { display: none !important; }
      .program-card { break-inside: avoid; border: 1px solid #ccc; box-shadow: none; margin-bottom: 12px; }
      .results-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      body { background: white; }
    }
  </style>
</head>

  "CA37-002": { id: "CA37-002", name: "San Diego County Medical Services (CMS)", description: "Healthcare of last resort for people who meet all of the following criteria:\nImmediate or long-term medical need\nAge between 21 and 64 years\nResident of San Diego County\nSign a lien form for services covered by CMS\nMeet CMS financial requirements or receive San Diego County General Relief", category: "healthcare", icon: "heart", link: "https://www.sandiegocounty.gov/content/sdc/hhsa/programs/ssp/county_medical_services/faq.html" },
  "CA37-003": { id: "CA37-003", name: "MTS Reduced Fares", description: "Low- or no-cost public transportation fare for people who meet any of the following criteria:\nPeople age 65 and older\nMedicare recipients\nPeople with disabilities\nPeople age 6 through 18 (effective through June 30, 2026)\nChildren age 5 and younger ride free when traveling with a paying passenger", category: "transportation", icon: "spark", link: "https://www.sdmts.com/fares/reduced-fares" },
  "CA37-004": { id: "CA37-004", name: "Balboa Park - Resident Free Day", description: "No-cost admission to participating museums (some on a rotating basis) to residents of the City and County of San Diego, and to active military personnel and their dependents.", category: "entertainment", icon: "spark", link: "https://balboapark.org/resident-free-days/" },
  "CA37-005": { id: "CA37-005", name: "Older Californians Nutrition Program - County of San Diego", description: "Low- or no-cost meal service for people aged 60 and older.  Some services are on-site only, and some services are to-go.  Transportation may be available.", category: "food", icon: "leaf", link: "https://www.sandiegocounty.gov/content/dam/sdc/hhsa/programs/ais/ais_advisory_council/documents/County%20of%20San%20Diego%20Senior%20Nutrition%20Centers%20OCNP_8.27.25.pdf" },
  "CA37-006": { id: "CA37-006", name: "Home-Delivered Meals - County of San Diego", description: "Low- or no-cost home-delivered meals for people aged 60 and older who are homebound due to illness or disability.", category: "food", icon: "leaf", link: "https://www.sandiegocounty.gov/content/dam/sdc/hhsa/programs/ais/ais_advisory_council/documents/County%20of%20San%20Diego%20Home%20Delivered%20Meal%20Providers.pdf" },
  "CA37-007": { id: "CA37-007", name: "Office of Military & Veterans Affairs - San Diego County", description: "Assistance for military veterans and their dependents to receive benefits counseling, prepare and submit claims, and appeal as needed.", category: "income", icon: "dollar", link: "https://www.sandiegocounty.gov/content/sdc/hhsa/programs/ssp/veterans_services.html" },
  "CA37-008": { id: "CA37-008", name: "Solid Waste Management Fee Financial Assistance Program", description: "Reduced out-of-pocket costs (50%) for trash and recycling fees for eligible homeowners who own and live in their own home as their primary residence, and receive San Diego City trash and recycling services.  Participation is limited and available on a first come, first serve basis.", category: "utility", icon: "spark", link: "https://www.sandiego.gov/environmental-services/trash-service-updates/financial-assistance" },

  "US-001": { id: "US-001", name: "Supplemental Security Income (SSI)", description: "Income for people who have \"limited income,\" \"limited resources,\" and meet one of the following criteria: aged 65 and older, blind, or disabled.  Please note that there is a complicated equation for calculating \"limited income\" and \"limited resources.\"\n\nWashington D.C. and the following states have higher than the national income limits:  Arkansas, California, Delaware, Georgia, Hawaii, Iowa, Kansas, Louisiana, Maryland, Michigan, Mississippi, Nevada, New Jersey, New York, Ohio, Pennsylvania, Rhode Island, South Dakota, Tennessee, Utah, and Vermont.  The higher maximum income for these areas is not readily available, consider applying and see if you qualify.", category: "income", icon: "dollar", link: "https://www.ssa.gov/benefits/ssi/#anchor3" },

  "US-003": { id: "US-003", name: "Federal Lifeline", description: "Low- and no-cost, phone and/or internet, mobile and/or at-home service.  Can be used with or separate from the state LifeLine.\n\nQualify using income-based eligibility or enrollment in any of the following programs:  \nSupplemental Nutrition Assistance Program (SNAP)\nMedicaid\nSupplemental Security Income (SSI)\nFederal Public Housing Assistance (FPHA) including Housing Choice Voucher (HCV) Program (Section 8 Voucher); Project-based Rental Assistance (PBRA/2020/811); Public Housing; Affordable Housing Programs for American Indians, Alaska Natives, or Native Hawaiians\nTribal Head Start\nBIA General Assistance\nTribal TANF\nFood Distribution Program on Indian Reservations\nVeterans and Survivors Pension Benefit Program", category: "utility", icon: "spark", link: "https://www.lifelinesupport.org/" },
  "US-004": { id: "US-004", name: "Medicare - Part A (Hospital Insurance)", description: "Insurance to cover inpatient care in hospitals, skilled nursing facility care, hospice care, and home health care for people who meet any of the following criteria:\nAge 65 and older\nDisabled\nHave end-stage Renal Disease (permanent kidney failure requiring dialysis or transplant)\nHave ALS (Lou Gehrig's disease)", category: "healthcare", icon: "heart", link: "https://www.medicare.gov/" },
  "US-005": { id: "US-005", name: "Medicare - Part B (Medical Insurance)", description: "Insurance to cover doctor and other health providers services, outpatient care, home health care, durable medical equipment (i.e. wheelchairs), and many preventative services (i.e. screenings, vaccines, and annual wellness visits) for people who meet any of the following criteria:\nAge 65 and older\nDisabled\nHave end-stage Renal Disease (permanent kidney failure requiring dialysis or transplant)\nHave ALS (Lou Gehrig's disease)", category: "healthcare", icon: "heart", link: "https://www.medicare.gov/" },
  "US-006": { id: "US-006", name: "Medicare - Part C (Medicare Advantage Plans)", description: "A Medicare-approved insurance plan from a Medicare-approved private company that offers an alternative to Original Medicare (Medicare Parts A (hospital), B (medical), and usually D (prescription)) for people who meet any of the following criteria:\nAge 65 and older\nDisabled\nHave end-stage Renal Disease (permanent kidney failure requiring dialysis or transplant)\nHave ALS (Lou Gehrig's disease)", category: "healthcare", icon: "heart", link: "https://www.medicare.gov/" },
  "US-007": { id: "US-007", name: "Medicare - Part D (Prescription Coverage)", description: "Prescription discount for people who meet any of the following criteria:\nAge 65 and older\nDisabled\nHave end-stage Renal Disease (permanent kidney failure requiring dialysis or transplant)\nHave ALS (Lou Gehrig's disease)", category: "healthcare", icon: "heart", link: "https://www.medicare.gov/" },
  "US-008": { id: "US-008", name: "Medicare - Supplemental Coverage (i.e. Medigap)", description: "Extra insurance you can buy from a private company to help pay patient's share of cost under Original Medicare (Medicare Parts A (hospital) and B (medical)) for people who meet any of the following criteria:\nAge 65 and older\nDisabled\nHave end-stage Renal Disease (permanent kidney failure requiring dialysis or transplant)\nHave ALS (Lou Gehrig's disease)", category: "healthcare", icon: "heart", link: "https://www.medicare.gov/" },

  "US-131": { id: "US-131", name: "US Dept. of War - Involuntary Separation Pay (Non-Disability)", description: "One-time lump-sum payment to active and reserve service members who have completed at least six years of service and were involuntarily discharged or denied continuation of service for which they volunteers before they became eligible for retirement.", category: "income", icon: "dollar", link: "https://militarypay.defense.gov/Benefits/Separation-Pay/" },

    // ── Eligibility engine ──────────────────────────────────────────────
    const HOUSEHOLD_SIZE_MAP = { "1 person":1,"2 people":2,"3 people":3,"4 people":4,"5 people":5,"6 people":6,"7 people":7 };
    const INCOME_UPPER = { "Under $20,000":20000,"$20,000–$40,000":40000,"$40,000–$60,000":60000,"$60,000–$80,000":80000,"$80,000–$120,000":120000,"$120,000–$180,000":180000,"Over $180,000":Infinity };
    const AGE_RANGE_MAP = { "Under 6":[0,5],"6–13":[6,13],"13–17":[13,17],"18":[18,18],"19–25":[19,25],"26–59":[26,59],"60–61":[60,61],"62–64":[62,64],"65+":[65,150] };

    const ageQualifies = (ages, ageMin, ageMax) => {
      if (!ages || ages.length === 0) return true;
      return ages.some(([lo, hi]) => lo <= ageMax && hi >= ageMin);
    };

    const buildProfile = (answers) => {
      const emp = answers.employment || [];
      const special = answers.special_status || [];
      const enrolled = (answers.enrolled_programs || []).filter(e => e !== "None of the above");
      const ages = (answers.age || []).map(a => AGE_RANGE_MAP[a]).filter(Boolean);
      return {
        householdSize: HOUSEHOLD_SIZE_MAP[answers.household_size] || 1,
        income: INCOME_UPPER[answers.annual_income] ?? Infinity,
        ages,
        unemployed: emp.includes("Unemployed (looking for work)"),
        partTime: emp.includes("Employed part-time"),
        retired: emp.includes("Retired"),
        student: emp.includes("Student"),
        cannotWork: emp.includes("Unable to work (disability/medical)"),
        disabled: special.includes("Disabled, blind, or have a chronic illness") || emp.includes("Unable to work (disability/medical)"),
        pregnant: special.includes("Pregnant or recently pregnant"),
        veteran: special.includes("Military (active duty, reserve, national guard), Veteran, Gold Star Family, and Dependents"),
        fosterCare: special.includes("In foster care or extended foster care"),
        refugee: special.includes("Refugee or recent immigrant"),
        tribal: special.includes("Tribal member"),
        domesticViolence: special.includes("Domestic violence or human trafficking survivor"),
        homeowner: special.includes("Homeowner"),
        landlord: special.includes("Landlord"),
        homeless: special.includes("Homeless"),
        legalHelp: special.includes("Need legal assistance"),
        reentry: special.includes("Reentry"),
        rural: special.includes("Live in a rural area"),
        disasterSurvivor: special.includes("Disaster survivor"),
        providerSearch: special.includes("Want to find a healthcare or mental health provider"),
        forEveryone: special.includes("Want to learn about community resources available to everyone"),
        enrolledPrograms: enrolled,
      };
    };

    const checkPath = (path, profile) => {
      if (path.household_size !== undefined && profile.householdSize !== path.household_size) return null;
      if (path.income_limit != null && profile.income > path.income_limit) return null;
      if (path.income_minimum != null && profile.income < path.income_minimum) return null;
      if (path.age_min !== undefined || path.age_max !== undefined) {
        if (!ageQualifies(profile.ages, path.age_min ?? 0, path.age_max ?? 150)) return null;
      }
      if (path.unemployed && !profile.unemployed) return null;
      if (path['part-time'] && !profile.partTime) return null;
      if (path.retired && !profile.retired) return null;
      if (path.student && !profile.student) return null;
      if (path.disabled && !profile.disabled) return null;
      if (path.pregnant && !profile.pregnant) return null;
      if (path.veteran_military && !profile.veteran) return null;
      if (path.foster_care && !profile.fosterCare) return null;
      if (path.refugee && !profile.refugee) return null;
      if (path.tribal_member && !profile.tribal) return null;
      if (path['domestic violence'] && !profile.domesticViolence) return null;
      if (path.homeowner && !profile.homeowner) return null;
      if (path.landlord && !profile.landlord) return null;
      if (path.homeless && !profile.homeless) return null;
      if (path.legal && !profile.legalHelp) return null;
      if (path['re-entry'] && !profile.reentry) return null;
      if (path.rural && !profile.rural) return null;
      if (path['disaster survivor'] && !profile.disasterSurvivor) return null;
      if (path.provider_search) return 'may';
      if (path.other_eligibility) return 'may';
      if (path.business) return 'may';
      if (path.enrolled_any && path.enrolled_any.length > 0) {
        if (!profile.enrolledPrograms.some(id => path.enrolled_any.includes(id))) return null;
      }
      return path.may_only ? 'may' : 'likely';
    };

    const getProgramTier = (progId, profile) => {

      let best = null;
      for (const path of paths) {

      return (

        { id: "enrolled_programs", type: "multi", options: ["Cal Fresh / Supplemental Nutrition Assistance Program (SNAP)","CalWORKs / Temporary Assistance for Needy Families (TANF)","California Alternative Rates for Energy (CARE)","California LifeLine","Family Electric Rate Assistance Program (FERA)","Federal Lifeline","Low Income Home Energy Assistance Program (LIHEAP)","Medi-Cal (Medicaid)","Medicare","Public Housing","San Diego County General Relief","Section 8 Housing Choice Voucher","Supplemental Security Income (SSI)","Women, Infants, and Children (WIC)","None of the above"] },

      const handleOptionClick = (opt) => {
        if (isMultiSelect) setSelectedMultiple(prev => prev.includes(opt) ? prev.filter(item => item !== opt) : [...prev, opt]);

      const handleNext = () => {
        const newAnswers = isMultiSelect ? { ...answers, [current.id]: selectedMultiple } : { ...answers, [current.id]: selected };

      };
      const handleBack = () => {
        if (step === 0) { track('quiz_abandon', { step: 1 }); setView("landing"); return; }
        track('quiz_back', { from_step: step + 1 });

        onStepChange(step - 1);
        const prevAnswer = answers[quizStepDefs[step - 1].id];
        const prevIsMulti = ["age", "special_status", "enrolled_programs"].includes(quizStepDefs[step - 1].id);
        if (prevIsMulti) { setSelectedMultiple(Array.isArray(prevAnswer) ? prevAnswer : []); setSelected(null); }

                    <div className="choice-dot" aria-hidden="true">{isSelected && <Icon name="check" size={10} color="white" />}</div>
                    {label}
                  </div>
                );

            </div>
            <div style={{ display: "flex", gap: 12, marginTop: 32, justifyContent: "space-between" }}>

              <button className="btn-primary" onClick={handleNext} style={{ opacity: isMultiSelect ? (selectedMultiple.length > 0 ? 1 : 0.5) : (selected ? 1 : 0.5), cursor: isMultiSelect ? (selectedMultiple.length > 0 ? "pointer" : "not-allowed") : (selected ? "pointer" : "not-allowed") }} disabled={isMultiSelect ? selectedMultiple.length === 0 : !selected}>
                {step === quizStepDefs.length - 1 ? t('quiz_finish') : t('quiz_continue')} <Icon name="arrow" size={16} />
              </button>
