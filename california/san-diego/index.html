  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --jade: #1a6b5a;
      --jade-light: #2a8f76;
      --jade-dark: #0f4038;
      --cream: #faf6ef;
      --warm-white: #fffdf9;
      --terracotta: #c4622d;
      --amber: #e8a830;
      --sand: #e8dcc8;
      --text-primary: #1c1a17;
      --text-secondary: #5c5649;
      --text-muted: #9a9082;
      --border: #e0d6c6;
      --shadow-sm: 0 1px 4px rgba(28,26,23,0.08);
      --shadow-md: 0 4px 20px rgba(28,26,23,0.12);
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--cream); color: var(--text-primary); }
    h1, h2, h3 { font-family: 'Fraunces', serif; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeUp { animation: fadeUp 0.5s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: var(--jade); color: white; border: none; border-radius: 99px; padding: 14px 28px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-family: 'Plus Jakarta Sans', sans-serif; }
    .btn-primary:hover { background: var(--jade-light); }
    .btn-secondary { display: inline-flex; align-items: center; gap: 8px; background: transparent; color: var(--jade); border: 1.5px solid var(--jade); border-radius: 99px; padding: 13px 24px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-family: 'Plus Jakarta Sans', sans-serif; }
    .btn-secondary:hover { background: rgba(26,107,90,0.06); }
    .btn-ghost { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; padding: 8px 12px; border-radius: 6px; font-family: 'Plus Jakarta Sans', sans-serif; }
    .nav { position: sticky; top: 0; z-index: 100; background: rgba(250,246,239,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .nav-inner { max-width: 1120px; margin: 0 auto; height: 64px; display: flex; align-items: center; }
    .tag { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; }
    .tag-green { background: rgba(26,107,90,0.1); color: var(--jade-dark); }
    .tag-gray { background: var(--sand); color: var(--text-secondary); }
    .input { width: 100%; background: var(--warm-white); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 16px; font-size: 15px; color: var(--text-primary); font-family: 'Plus Jakarta Sans', sans-serif; outline: none; }
    .input:focus { border-color: var(--jade); box-shadow: 0 0 0 3px rgba(26,107,90,0.1); }
    .choice-card { border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.2s ease; background: var(--warm-white); display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 500; }
    .choice-card:hover { border-color: var(--jade); background: rgba(26,107,90,0.03); }
    .choice-card.selected { border-color: var(--jade); background: rgba(26,107,90,0.07); color: var(--jade-dark); }
    .choice-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .choice-card.selected .choice-dot { border-color: var(--jade); background: var(--jade); }
    .progress-track { width: 100%; height: 6px; background: var(--sand); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--jade), var(--jade-light)); border-radius: 99px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
    .hero-bg { background: radial-gradient(ellipse 80% 60% at 60% -10%, rgba(26,107,90,0.12) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 0% 80%, rgba(232,168,48,0.1) 0%, transparent 50%), var(--cream); }
    .stat-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; }
    .stat-value { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 500; color: var(--text-primary); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
    .info-box { background: rgba(26,107,90,0.07); border: 1px solid rgba(26,107,90,0.2); border-radius: 10px; padding: 14px 16px; font-size: 13.5px; color: var(--jade-dark); line-height: 1.6; }
    .disclaimer-box { background: rgba(232,168,48,0.08); border-left: 4px solid var(--amber); padding: 16px; border-radius: 8px; font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin: 24px 0; }
    .disclaimer-title { font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .program-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: var(--shadow-sm); transition: all 0.25s ease; display: flex; flex-direction: column; }
    .program-card:hover { box-shadow: var(--shadow-md); transform: translateY(-4px); border-color: var(--jade); }
    .program-card-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(26,107,90,0.1); display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .program-card-title { font-weight: 700; font-size: 15px; margin-bottom: 8px; line-height: 1.3; }
    .program-card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 12px; }
    .program-card-cat { margin-bottom: 12px; }
    .criteria-section { margin: 12px 0; padding: 10px; background: rgba(26,107,90,0.03); border-radius: 8px; border: 1px solid rgba(26,107,90,0.1); }
    .criteria-toggle { background: none; border: none; padding: 0; cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 12px; color: var(--jade); font-family: 'Plus Jakarta Sans', sans-serif; }
    .criteria-toggle:hover { color: var(--jade-light); }
    .criteria-list { margin-top: 8px; font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
    .criteria-item { margin: 4px 0; padding-left: 14px; position: relative; }
    .criteria-item::before { content: "•"; position: absolute; left: 0; color: var(--jade); font-weight: bold; }
    .program-card-link { margin-top: auto; }
    .filter-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .filter-btn { background: var(--warm-white); color: var(--text-secondary); border: 1px solid var(--border); padding: 8px 16px; border-radius: 99px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; }
    .filter-btn:hover { border-color: var(--jade); background: rgba(26,107,90,0.03); }
    .filter-btn.active { background: var(--jade); color: white; border-color: var(--jade); }
    .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: var(--shadow-sm); }
    .card-hover { transition: all 0.2s ease; cursor: pointer; }
    .card-hover:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--jade); }
    .skip-link { position: absolute; top: -40px; left: 0; background: var(--jade); color: white; padding: 8px 16px; z-index: 9999; font-weight: 600; border-radius: 0 0 8px 0; transition: top 0.2s; }
    .skip-link:focus { top: 0; }
    button:focus-visible, a:focus-visible { outline: 3px solid var(--jade); outline-offset: 2px; border-radius: 4px; }
    .choice-card:focus-visible { outline: 3px solid var(--jade); outline-offset: 2px; }
    .income-toggle-btn { display: none; background: none; border: 1px solid rgba(26,107,90,0.2); border-radius: 6px; padding: 6px 12px; font-size: 12px; color: var(--jade); font-family: 'Plus Jakarta Sans', sans-serif; cursor: pointer; font-weight: 600; margin: 8px 0; width: 100%; }
    @media (max-width: 600px) {
      .income-toggle-btn { display: flex; align-items: center; justify-content: center; gap: 6px; }
      .income-table-desktop { display: none; }
      .income-table-mobile-open { display: block !important; }
      .results-grid { grid-template-columns: 1fr; }
      .program-card { padding: 16px; }
    }
    @media print {
      .nav, .filter-buttons, .btn-primary, .btn-secondary, .btn-ghost, .disclaimer-box, .no-print { display: none !important; }
      .program-card { break-inside: avoid; border: 1px solid #ccc; box-shadow: none; margin-bottom: 12px; }
      .results-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      body { background: white; }
    }
  </style>
</head>

      "CA-18": { id: "CA-18", name: "BrightLife Kids", description: "No-cost mental health support and coaching for children up to age 12.", category: "mental healthcare", icon: "heart", link: "https://www.hellobrightline.com/brightlifekids/?utm_medium=referral&utm_source=calhopewebsite" },
      "CA-19": { id: "CA-19", name: "Soluna", description: "No-cost mental health support and coaching for people ages 13 through 25.", category: "mental healthcare", icon: "heart", link: "https://solunaapp.com/" },
      "CA-20": { id: "CA-20", name: "CalHope Red Line", description: "Peer support to find national, state, and county resources, referrals, and trauma-informed support for Urban Indians and Tribal populations.", category: "mental healthcare", icon: "heart", link: "https://ccuih.org/redline/" },
      "CA-21": { id: "CA-21", name: "Refugee Cash Assistance (RCA)", description: "Temporary cash aid for certain refugees who would otherwise qualify for CalWORKs but for any of the following immigration statuses:  refugee, asylee, Cuban or Haitian entrant, Special Immigration Visa (SIV) holder, Afghan and Ukrainian parolee, Amerasian, certain victims of human trafficking.", category: "income", icon: "dollar", link: "https://www.cdss.ca.gov/refugees" },
      "CA-22": { id: "CA-22", name: "Trafficking and Crime Victim Assistance Program (TCVAP)", description: "Temporary assistance for non-citizen survivors of human trafficking, domestic violence, and other serious crimes.", category: "income", icon: "dollar", link: "https://www.cdss.ca.gov/inforesources/tcvap" },
      "CA-23": { id: "CA-23", name: "California Disability Insurance (EDD)", description: "Temporary income (up to 52 weeks) for people who cannot work or who lose wages due to illness, injury, surgery, pregnancy, or childbirth, and who meet the following criteria:\nCannot do regular work for at least eight days\nLost wages due to disability\nAre working or looking for work at the time the disability began\nEarned at least $300 with State Disability Insurance (SDI) deducted from paycheck", category: "income", icon: "dollar", link: "https://edd.ca.gov/en/disability/SDI_Online/" },
      "CA-24": { id: "CA-24", name: "California State Supplementary Payment (SSP)", description: "California-funded supplemental income for people who are enrolled in the federal Supplementary Security Income (SSI) program.", category: "income", icon: "dollar", link: "https://cdss.ca.gov/inforesources/ssi-ssp" },
      "CA-25": { id: "CA-25", name: "Program of All-Inclusive Care for Elderly (PACE)", description: "Coordinated care for people who meet all of the following criteria:\nAge 55 and older\nCan live in the community without jeopardizing personal health or safety\nMeets requirement for needing skilled nursing care", category: "caretaker", icon: "heart", link: "https://www.dhcs.ca.gov/services/ltc/Pages/programofall-inclusivecarefortheelderly.aspx" },
      "CA-26": { id: "CA-26", name: "California Low Cost Automobile (CLCA) Insurance", description: "Low-cost automobile insurance for people who meet all of the following criteria:\nAge 16 and older\nHave a valid California driver's license\nOwn a vehicle valued at $25,000 or less\nHave a good driving record (no more than one at-fault property damage-only accident or no more than one point for a moving violation within the last 3 years, no at-fault accidents involving bodily injury or death within the last 3 years, and no felony or misdemeanor convictions for violations of the Vehicle Code).", category: "transportation", icon: "spark", link: "https://www.mylowcostauto.com/" },
      "CA-27": { id: "CA-27", name: "Property Tax Postponement", description: "Deferment of current-year property taxes on principal residence for people who meet all of the following criteria:\nAge 62 or older, blind or disabled,\nHousehold income of $55,181 or less,\nOwns and occupies the property as the principal place of residence,\nHas at least 40 percent equity in the property, and\nHas not had a reverse mortgage on the property.", category: "housing", icon: "home", link: "https://www.sco.ca.gov/ardtax_prop_tax_postponement.html" },
      "CA-28": { id: "CA-28", name: "California State Board of Equalization - Homeowners Exemption", description: "Homeowners may receive up to $7000 off the full value of the property to reduce property tax liability for the principal place of residence.", category: "taxes", icon: "file", link: "https://boe.ca.gov/proptaxes/homeexem.htm" },
      "CA-29": { id: "CA-29", name: "California State Board of Equalization - Disabled Veterans Exemption", description: "Disabled veterans may receive up to $150,000 off the full value of the property to reduce property tax liability for the principal place of residence.", category: "taxes", icon: "file", link: "https://boe.ca.gov/proptaxes/homeexem.htm" },
      "CA-30": { id: "CA-30", name: "Utility Consumer Protection -- Emergency Disaster Relief", description: "Consumer protections and disaster relief programs for utilities customers:  electricity, natural gas, landline phone, mobile phone, water, and sewer.", category: "utility", icon: "spark", link: "https://www.cpuc.ca.gov/consumer-support/psps/consumer-protections-and-resources-for-wildfire-victims" },
      "CA-31": { id: "CA-31", name: "California State Parks - Adventure Pass", description: "No-cost entry to 54 select state parks for 4th graders and their families.", category: "entertainment", icon: "spark", link: "https://www.parks.ca.gov/AdventurePass" },
      "CA-32": { id: "CA-32", name: "California State Parks - Disabled Discount Pass", description: "Lifetime pass to state parks for individuals with permanent disabilities at a 50% discounted rate for vehicle-day use, family camping, and boat-use fees.", category: "entertainment", icon: "spark", link: "https://www.parks.ca.gov/?page_id=30959" },
      "CA-33": { id: "CA-33", name: "California State Parks - Distinguished Veteran Pass", description: "No-cost lifetime pass for California residents who were honorably discharged to use all basic facilities, including day-use, camping, and boating.", category: "entertainment", icon: "spark", link: "https://www.parks.ca.gov/?page_id=30958" },
      "CA-34": { id: "CA-34", name: "California State Parks - Golden Bear Pass", description: "No-cost annual pass for people age 62 and older with limited incomes, or participants in any of the following programs:  CalWORKs, SSI, or Tribal TANF.", category: "entertainment", icon: "spark", link: "https://www.parks.ca.gov/?page_id=30960" },
      "CA-35": { id: "CA-35", name: "California State Parks - Senior Golden Bear Pass (fka Limited Use Golden Bear)", description: "No-cost annual pass for people age 62 and older to many parks during non-peak seasons.", category: "entertainment", icon: "spark", link: "https://www.parks.ca.gov/?page_id=30961" },
      "CA-36": { id: "CA-36", name: "Women, Infants & Children (WIC)", description: "Food for women who are pregnant or breastfeeding, or were pregnant in the last six months (including pregnancy loss), and children under age 5.", category: "food", icon: "leaf", link: "https://www.cdph.ca.gov/Programs/CFH/DWICSN/Pages/HowCanIGetWIC.aspx" },
      "CA-37.R1": { id: "CA-37.R1", name: "California Work Opportunity and Responsibility to Kids (CalWORKs)/ California's Temporary Assistance for Needy Families (TANF)", description: "Temporary cash aid for eligible families with at least one child, and for eligible students who meet any of the following requirements:\nFamilies where either parent is absent, disabled, or deceased\nFamilies where the primary income-earner is unemployed\nFamilies with relatives who are the caretaker for foster child(ren)\nNote:  complicated income equation", category: "income", icon: "dollar", link: "https://www.calworks.org/eligibility-process" },
      "CA-38": { id: "CA-38", name: "Low-Income Home Energy Assistance Program (LIHEAP)", description: "Multi-part program:\none-time financial assistance to help pay balance of utility bill; \nassistance for crisis (i.e. 24-48 hour disconnection notice); \nfree energy efficiency upgrades; AND\neducation energy efficiency practices and energy budget counseling.", category: "utility", icon: "spark", link: "https://www.csd.ca.gov/Pages/FindServicesInYourArea.aspx" },
      "CA-39": { id: "CA-39", name: "National School Lunch Program (NSLP) and National School Breakfast Program (NSBP)", description: "Free or reduced-price breakfasts and lunches for qualifying school children.", category: "food", icon: "leaf", link: "https://www.cde.ca.gov/ls/nu/rs/scales2526.asp" },
      "CA-40": { id: "CA-40", name: "Special Milk Program", description: "Free milk for qualifying school children.", category: "food", icon: "leaf", link: "https://www.cde.ca.gov/ls/nu/rs/scales2526.asp" },
      "CA-41": { id: "CA-41", name: "California's Tribal Temporary Assistance for Needy Families (Tribal TANF)", description: "Temporary cash aid and supportive services for families with at least one person in the household who has proof of membership in a federally-recognized tribe through enrollment or lineal descent from the California Judgment rolls.", category: "income", icon: "dollar", link: "https://www.cdss.ca.gov/tribal-tanf" },
      "CA-42": { id: "CA-42", name: "Federal Special Veterans Benefit (SVB) and California Veterans Cash Benefit (CVCB)", description: "Cash assistance for veterans who meet all of the following criteria:\neligible for California's State Supplementary Payment in December 1999\nmember of the Philippines military force in the service of the United States during World War II\nreside in the Republic of the Philippines", category: "income", icon: "dollar", link: "https://www.cdss.ca.gov/veterans-cash-benefit" },
      "CA-43": { id: "CA-43", name: "USDA Emergency Food Assistance Program (TEFAP)", description: "Emergency food assistance distributed through local food banks", category: "food", icon: "leaf", link: "https://cdss.ca.gov/food-banks" },

      "CA-45": { id: "CA-45", name: "California Connect", description: "Telecommunication access for Californians with hearing, vision, cognitive, mobility, and speech-related disabilities", category: "utility", icon: "spark", link: "https://apply.caconnect.org/?_gl=1%2Ad5xas3%2A_gcl_au%2AMjExMTcwMzc0MS4xNzc2NTY3MjU4" },

      "CA-48": { id: "CA-48", name: "Friendship Line California", description: "24/7 toll-free emotional support, grief support, and compassionate care for older adults, adults with disabilities, and caretakers.  Ongoing outreach calls are available on request.", category: "mental healthcare", icon: "heart", link: "https://www.ioaging.org/friendship-line/" },
      "CA-49": { id: "CA-49", name: "Early Start", description: "Early intervention program for infants and toddlers with developmental delays or at risk for having a developmental disability", category: "healthcare", icon: "heart", link: "https://www.dds.ca.gov/services/early-start/family-resource-center/regional-center-early-start-intake-and-family-resource-centers/" },

      "CA37-01": { id: "CA37-01", name: "San Diego County General Relief", description: "Temporary cash assistance for people who meet the following criteria:\nSan Diego resident for at least 15 days with the intent to reside in San Diego County\nAge between 18 and 64, with rare exceptions\nMonthly income less than $598 (individual) or $819 (married)\nNo real property\nLess than $50 in liquid assets\nLess than $1,500 in total assets, excluding one vehicle valued at no more than $4,650", category: "income", icon: "dollar", link: "https://www.sandiegocounty.gov/content/sdc/hhsa/programs/ssp/general_relief.html" },
      "CA37-02": { id: "CA37-02", name: "San Diego County Medical Services (CMS)", description: "Healthcare of last resort for people who meet all of the following criteria:\nImmediate or long-term medical need\nAge between 21 and 64 years\nResident of San Diego County\nSign a lien form for services covered by CMS\nMeet CMS financial requirements or receive San Diego County General Relief", category: "healthcare", icon: "heart", link: "https://www.sandiegocounty.gov/content/sdc/hhsa/programs/ssp/county_medical_services/faq.html" },
      "CA37-03": { id: "CA37-03", name: "MTS Reduced Fares", description: "Low- or no-cost public transportation fare for people who meet any of the following criteria:\nPeople age 65 and older\nMedicare recipients\nPeople with disabilities\nPeople age 6 through 18 (effective through June 30, 2026)\nChildren age 5 and younger ride free when traveling with a paying passenger", category: "transportation", icon: "spark", link: "https://www.sdmts.com/fares/reduced-fares" },
      "CA37-05": { id: "CA37-05", name: "Older Californians Nutrition Program - County of San Diego", description: "Low- or no-cost meal service for people aged 60 and older.  Some services are on-site only, and some services are to-go.  Transportation may be available.", category: "food", icon: "leaf", link: "https://www.sandiegocounty.gov/content/dam/sdc/hhsa/programs/ais/ais_advisory_council/documents/County%20of%20San%20Diego%20Senior%20Nutrition%20Centers%20OCNP_8.27.25.pdf" },
      "CA37-06": { id: "CA37-06", name: "Home-Delivered Meals - County of San Diego", description: "Low- or no-cost home-delivered meals for people aged 60 and older who are homebound due to illness or disability.", category: "food", icon: "leaf", link: "https://www.sandiegocounty.gov/content/dam/sdc/hhsa/programs/ais/ais_advisory_council/documents/County%20of%20San%20Diego%20Home%20Delivered%20Meal%20Providers.pdf" },
      "CA37-07": { id: "CA37-07", name: "Office of Military & Veterans Affairs - San Diego County", description: "Assistance for military veterans and their dependents to receive benefits counseling, prepare and submit claims, and appeal as needed.", category: "income", icon: "dollar", link: "https://www.sandiegocounty.gov/content/sdc/hhsa/programs/ssp/veterans_services.html" },
      "CA37-08": { id: "CA37-08", name: "Solid Waste Management Fee Financial Assistance Program", description: "Reduced out-of-pocket costs (50%) for trash and recycling fees for eligible homeowners who own and live in their own home as their primary residence, and receives San Diego City trash and recycling services.  Participation is limited and available on a first come, first serve basis.", category: "utility", icon: "spark", link: "https://www.sandiego.gov/environmental-services/trash-service-updates/financial-assistance" },
      "CA37-09": { id: "CA37-09", name: "San Diego Public Library's Discover & Go", description: "No-cost admission fee to participating museums, Aztec games, the San Diego Zoo and Safari Park, and other locations for individual and their families with a valid San Diego Public Library Card.  Supplies are limited.", category: "entertainment", icon: "spark", link: "https://www.sdcl.org/discoverandgo/" },
      "CA37-10": { id: "CA37-10", name: "Thomas Jefferson School of Law - Veterans' Legal Assistance Clinic", description: "No-cost legal assistance for veterans with a variety of legal needs including family law, government benefits, and estate planning.", category: "legal", icon: "file", link: "https://www.tjsl.edu/academics/clinics-internships/veterans-legal-assistance-clinic/" },

      "CA37-15": { id: "CA37-15", name: "Cal Western School of Law - New Media Rights", description: "Assistance for entrepreneurs, journalists, and innovators whose projects require internet, intellectual property, privacy, and media law assistance.", category: "legal", icon: "file", link: "https://www.cwsl.edu/experiential_learning/clinics/new_media_rights.html" },

      "CA37-20": { id: "CA37-20", name: "Cash Assistance Program for Immigrants (CAPI)", description: "Income for people who are age 65 and older, blind, or disabled and meet the following criteria:\nare not eligible for SSI and SSP due solely to immigration status\ncertain immigrants who entered the U.S. before August 22, 1996\nsponsored immigrants who entered the U.S. after August 21, 1996, and the sponsor is not deceased, disabled, or abusive\ncertain immigrants who entered the U.S. after August 21, 1996, and do not have a sponsor or have a sponsor who is deceased, disabled, or abusive.", category: "income", icon: "dollar", link: "https://www.sandiegocounty.gov/content/sdc/hhsa/programs/ssp/capi.html" },

      "CA37-23": { id: "CA37-23", name: "Public Housing", description: "Public housing for eligible families, senior citizens, and disabled persons who reside in the unincorporated areas of San Diego County, or the cities of Chula Vista, Coronado, Del Mar, El Cajon, Escondido, Imperial Beach, La Mesa, Lemon Grove, Poway, San Marcos, Santee, Solano Beach, or Vista.", category: "housing", icon: "home", link: "https://www.sandiegocounty.gov/content/sdc/sdhcd/rental-assistance/public-housing.html" },

      "CA37-04": { id: "CA37-04", name: "Balboa Park - Resident Free Day", description: "No-cost admission to participating museums (some on a rotating basis) to residents of the City and County of San Diego, and to active military personnel and their dependents", category: "entertainment", icon: "spark", link: "https://balboapark.org/resident-free-days/" },

      "US-01": { id: "US-01", name: "Supplemental Security Income (SSI)", description: "Income for people who have \"limited income,\" \"limited resources,\" and meet one of the following criteria: aged 65 and older, blind, or disabled.  Please note that there is a complicated equation for calculating \"limited income\" and \"limited resources.\"", category: "income", icon: "dollar", link: "https://www.ssa.gov/benefits/ssi/#anchor3" },
      "US-02": { id: "US-02", name: "Social Security Disability Insurance (SSDI)", description: "Income for people who have accrued enough Social Security credits and are either permanently or temporarily disabled.", category: "income", icon: "dollar", link: "https://www.ssa.gov/benefits/disability/" },
      "US-03": { id: "US-03", name: "Federal Lifeline", description: "Low- and no-cost, phone and/or internet, mobile and/or at-home service.  Can be used with or separate from the state LifeLine.\n\nQualify using income-based eligibility or enrollment in any of the following programs:  \nSupplemental Nutrition Assistance Program (SNAP)\nMedicaid\nSupplemental Security Income (SSI)\nFederal Public Housing Assistance (FPHA) including Housing Choice Voucher (HCV) Program (Section 8 Voucher); Project-based Rental Assistance (PBRA/2020/811); Public Housing; Affordable Housing Programs for American Indians, Alaska Natives, or Native Hawaiians\nTribal Headstart\nBIA General Assistance\nTribal TANF\nFood Distribution Program on Indian Reservation\nVeterans and Survivors Pension Benefit Program", category: "utility", icon: "spark", link: "https://www.lifelinesupport.org/" },
      "US-04": { id: "US-04", name: "Medicare - Part A (Hospital Insurance)", description: "Insurance to cover inpatient care in hospitals, skilled nursing facility care, hospice care, and home health care for people who meet any of the following criteria:\nAge 65 and older\nDisabled\nHave end-stage Renal Disease (permanent kidney failure requiring dialysis or transplant)\nHave ALS (Lou Gehrig's disease)", category: "healthcare", icon: "heart", link: "https://www.medicare.gov/" },
      "US-05": { id: "US-05", name: "Medicare - Part B (Medical Insurance)", description: "Insurance to cover doctor and other health providers services, outpatient care, home health care, durable medical equipment (i.e. wheelchairs), and many preventative services (i.e. screenings, vaccines, and annual wellness visits) for people who meet any of the following criteria:\nAge 65 and older\nDisabled\nHave end-stage Renal Disease (permanent kidney failure requiring dialysis or transplant)\nHave ALS (Lou Gehrig's disease)", category: "healthcare", icon: "heart", link: "https://www.medicare.gov/" },
      "US-06": { id: "US-06", name: "Medicare - Part C (Medicare Advantage Plans)", description: "A Medicare-approved insurance plan from a Medicare-approved private company that offers an alternative to Original Medicare (Medicare Parts A (hospital), B (medical), and usually D (prescription)) for people who meet any of the following criteria:\nAge 65 and older\nDisabled\nHave end-stage Renal Disease (permanent kidney failure requiring dialysis or transplant)\nHave ALS (Lou Gehrig's disease)", category: "healthcare", icon: "heart", link: "https://www.medicare.gov/" },
      "US-07": { id: "US-07", name: "Medicare - Part D (Prescription Coverage)", description: "Prescription discount for people who meet any of the following criteria:\nAge 65 and older\nDisabled\nHave end-stage Renal Disease (permanent kidney failure requiring dialysis or transplant)\nHave ALS (Lou Gehrig's disease)", category: "healthcare", icon: "heart", link: "https://www.medicare.gov/" },
      "US-08": { id: "US-08", name: "Medicare - Supplemental Coverage (i.e. Medigap)", description: "Extra insurance you can buy from a private company to help pay patient's share of cost under Original Medicare (Medicare Parts A (hospital) and B (medical)) for people who meet any of the following criteria:\nAge 65 and older\nDisabled\nHave end-stage Renal Disease (permanent kidney failure requiring dialysis or transplant)\nHave ALS (Lou Gehrig's disease)", category: "healthcare", icon: "heart", link: "https://www.medicare.gov/" },

    const ageQualifies = (ageArr, ageMin, ageMax) => {
      const ranges = { "Under 6":[0,5], "6–13":[6,13], "13–17":[13,17], "18":[18,18], "19–25":[19,25], "26–59":[26,59], "60–61":[60,61], "62–64":[62,64], "65+":[65,150] };
      const arr = Array.isArray(ageArr) ? ageArr : [ageArr].filter(Boolean);
      if (arr.length === 0) return true;
      return arr.some(a => {
        const [lo, hi] = ranges[a] || [18,59];
        if (ageMin !== undefined && hi < ageMin) return false;
        if (ageMax !== undefined && lo > ageMax) return false;
        return true;
      });
    };

    const checkPath = (path, progId, profile) => {
      if (path.income) {
        const criteria = PROGRAM_CRITERIA[progId]?.[profile.householdSize];
        if (criteria && criteria[0]?.incomeLimit) {
          if (profile.annualIncome > criteria[0].incomeLimit) return false;
        } else {
          return false;
        }
      }
      if (path.ageMin !== undefined || path.ageMax !== undefined) {
        if (!ageQualifies(profile.ageArr, path.ageMin, path.ageMax)) return false;
      }
      if (path.disabled   && !profile.isDisabled)   return false;
      if (path.veteran    && !profile.isVeteran)     return false;
      if (path.pregnant   && !profile.isPregnant)    return false;
      if (path.hasChildren && !profile.hasChildren)  return false;
      if (path.fosterCare && !profile.isFosterCare)  return false;
      if (path.refugee    && !profile.isRefugee)     return false;
      if (path.tribal     && !profile.isTribal)      return false;
      if (path.unemployed && !profile.isUnemployed)  return false;
      if (path.dvSurvivor        && !profile.isDVSurvivor)    return false;
      if (path.needsLegal          && !profile.needsLegal)       return false;
      if (path.notEmployedFullTime && profile.isEmployedFullTime) return false;
      if (path.partTime    && !profile.isPartTime)     return false;
      if (path.retired     && !profile.isRetired)      return false;
      if (path.student     && !profile.isStudent)      return false;
      if (path.homeowner === true  && !profile.isHomeowner) return false;
      if (path.homeowner === false &&  profile.isHomeowner) return false;
      if (path.enrolledAny && path.enrolledAny.length > 0) {
        if (!path.enrolledAny.some(k => profile.enrolledPrograms.includes(k))) return false;
      }
      return true;
    };

    const GATED_CATEGORIES = new Set(['food', 'caretaker', 'income', 'healthcare', 'mental healthcare', 'transportation', 'day care', 'housing', 'legal', 'entertainment', 'utility']);
    const GATE_EXEMPT = new Set(["CA-13", "CA37-04", "CA37-09", "CA37-24", "CA37-25", "CA37-26", "CA37-45", "CA37-55", "CA37-56", "CA37-57", "CA37-60", "CA37-61", "CA37-63", "CA37-64", "CA37-65", "CA37-66", "CA37-68", "CA37-69", "CA37-70", "CA-30", "CA-46", "US-21"]);

    const hasGateQualifyingSignal = (progId, profile) => {

      if (profile.isPregnant)  return true;
      if (profile.hasChildren) return true;
      if (profile.isRefugee)   return true;
      if (profile.isTribal)    return true;
      if (profile.isVeteran)   return true;
      if (profile.needsLegal)  return true;
      if (profile.enrolledPrograms.length > 0) return true;
      const criteria = PROGRAM_CRITERIA[progId]?.[profile.householdSize];
      if (criteria && criteria[0]?.incomeLimit && profile.annualIncome <= criteria[0].incomeLimit) return true;
      const paths = QUALIFY_PATHS[progId] || [];
      return paths.some(p =>
        (p.ageMin !== undefined || p.ageMax !== undefined) &&
        ageQualifies(profile.ageArr, p.ageMin, p.ageMax)
      );
    };

    const getProgramTier = (progId, profile) => {
      const prog = PROGRAMS[progId];
      if (prog && GATED_CATEGORIES.has(prog.category) && !GATE_EXEMPT.has(progId)) {
        if (!hasGateQualifyingSignal(progId, profile)) return null;
      }
      const paths = QUALIFY_PATHS[progId];
      if (!paths || paths.length === 0) return 'may';
      const hasLikely = paths.filter(p => p.tier === 'likely').some(p => checkPath(p, progId, profile));
      if (hasLikely) return 'likely';
      const hasMay = paths.filter(p => p.tier === 'may').some(p => checkPath(p, progId, profile));
      if (hasMay) return 'may';
      return null;

      { id: "household_size", title: "How many people are in your household?", subtitle: "Include family members and others you share finances with — typically the people you'd include on a joint tax return. Do not count roommates who manage their finances separately.", explanation: "Household size determines income limits and benefit amounts for most programs.", type: "choice", options: ["1 person", "2 people", "3 people", "4 people", "5 people", "6 people", "7+ people"] },

      { id: "annual_income", title: "What is your total household annual income?", subtitle: "Include all income before taxes—wages, self-employment, benefits, child support, disability payments, etc. (yearly total)", explanation: "Income is the main factor for most benefit programs. This helps us find programs with income limits you qualify for.", type: "choice", options: ["No income", "Under $20,000", "$20,000–$40,000", "$40,000–$60,000", "$60,000–$80,000", "$80,000–$120,000", "$120,000–$180,000", "Over $180,000"] },
      { id: "employment", title: "What is your current employment status?", subtitle: "Select what best describes your situation.", explanation: "Employment status affects eligibility for unemployment benefits, job training, and work-related programs.", type: "choice", options: ["Employed full-time", "Employed part-time", "Self-employed", "Unemployed (looking for work)", "Unable to work (disability/medical)"] },
      { id: "special_status", title: "Do any of these apply to you? (Select all that apply)", subtitle: "These help us find additional programs you may qualify for.", explanation: "Veterans, refugees, foster youth, people with disabilities, and families with children have access to specialized programs.", type: "choice", options: ["Veteran or military", "Refugee or recent immigrant", "Tribal member", "Disabled, blind, or have a chronic illness", "Foster youth or in foster care", "Pregnant or nursing", "Caring for children under 18", "Domestic violence survivor", "Need legal assistance", "None of these"] },
      { id: "enrolled_programs", title: "Are you currently enrolled in any of these programs? (Select all that apply)", subtitle: "Enrollment in some programs can qualify you for others.", explanation: "Many benefit programs extend eligibility to people already enrolled in related programs — selecting what you're currently enrolled in helps us find more programs you qualify for.", type: "choice", options: ["CalFresh or Supplemental Nutrition Assistance Program (SNAP)", "Medi-Cal (Medicaid)", "Medicare", "Supplemental Security Income (SSI) and State Supplementary Program (SSP)", "CalWORKs or Temporary Assistance for Needy Families (TANF)", "Low Income Home Energy Assistance Program (LIHEAP)", "California Alternate Rates for Energy (CARE) or Family Electric Rate Assistance Program (FERA)", "Section 8 / Federal Public Housing", "Women, Infants, and Children (WIC)", "San Diego County General Relief", "None of the above"] },
    ];

    const CATEGORY_LABELS = {
      food: 'Food', healthcare: 'Healthcare', 'mental healthcare': 'Mental Health', 'health necessities': 'Health Necessities', income: 'Income', housing: 'Housing', utility: 'Utilities',
      transportation: 'Transportation', legal: 'Legal', 'day care': 'Day Care', caretaker: 'Caretaker',
      entertainment: 'Entertainment', taxes: 'Taxes', technology: 'Technology', education: 'Education',
    };

    const DescLines = ({ text }) => {
      const lines = text.split('\n').filter(l => l.trim());
      if (lines.length <= 1) {
        return <p style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.6, margin: 0 }}>{text}</p>;
      }
      return (
        <div style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.6 }}>
          {lines.map((line, i) => {
            const trimmed = line.trim();
            const isSubHeader = trimmed.endsWith(':') && trimmed.length < 80;
            if (isSubHeader) {
              return <div key={i} style={{ fontWeight: 700, color: 'var(--text-primary)', marginTop: i > 0 ? 10 : 0, fontSize: 12 }}>{trimmed}</div>;
            }
            const isBullet = trimmed.startsWith('•');
            return (
              <div key={i} style={{ display: 'flex', gap: 6, marginTop: i > 0 ? 3 : 0, paddingLeft: isBullet ? 0 : 2 }}>
                {!isBullet && i > 0 && <span style={{ color: 'var(--jade)', flexShrink: 0 }}>•</span>}
                <span>{isBullet ? trimmed.substring(1).trim() : trimmed}</span>
              </div>
            );
          })}
        </div>
      );
    };

    const IncomeLimitsTable = ({ programId, householdSize }) => {
      const [mobileOpen, setMobileOpen] = React.useState(false);
      const incomeLimits = [];
      for (let sz = 1; sz <= 7; sz++) {
        const criteria = PROGRAM_CRITERIA[programId]?.[sz];
        if (criteria && criteria[0]?.incomeLimit) {
          incomeLimits.push({ size: sz, limit: criteria[0].incomeLimit });
        }
      }
      if (incomeLimits.length === 0) return null;
      const userLimit = householdSize ? incomeLimits.find(l => l.size === householdSize) : null;
      const TableContent = () => (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: '3px 8px' }}>
          {incomeLimits.map(({ size, limit }) => {
            const isUser = householdSize && size === householdSize;
            return (
              <div key={size} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '5px 8px', borderRadius: 6, fontSize: 12, background: isUser ? 'var(--jade)' : 'rgba(0,0,0,0.03)', color: isUser ? 'white' : 'var(--text-secondary)', fontWeight: isUser ? 700 : 400, border: isUser ? 'none' : '1px solid transparent' }}>
                <span>{size === 7 ? '7+' : size} {size === 1 ? 'person' : 'people'}</span>
                <span>${limit.toLocaleString()}</span>
              </div>
            );
          })}
        </div>
      );
      const CMS_HARDSHIP = { 1:[25824,55860], 2:[34899,75740], 3:[43974,95620], 4:[53049,115500], 5:[62124,135380], 6:[71199,155260], 7:[80274,175140] };
      const hardshipRanges = programId === 20
        ? [1,2,3,4,5,6,7].map(sz => ({ size: sz, low: CMS_HARDSHIP[sz][0], high: CMS_HARDSHIP[sz][1] }))
        : [];
      const HardshipTableContent = () => (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: '3px 8px' }}>
          {hardshipRanges.map(({ size, low, high }) => (
            <div key={size} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '5px 8px', borderRadius: 6, fontSize: 12, background: 'rgba(0,0,0,0.03)', color: 'var(--text-secondary)', border: '1px solid transparent' }}>
              <span>{size === 7 ? '7+' : size} {size === 1 ? 'person' : 'people'}</span>
              <span>${low.toLocaleString()} – ${high.toLocaleString()}</span>
            </div>
          ))}
        </div>
      );
      return (
        <div style={{ margin: '12px 0', padding: '12px', background: 'rgba(26,107,90,0.04)', borderRadius: 10, border: '1px solid rgba(26,107,90,0.12)' }}>
          <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.07em', color: 'var(--jade-dark)', marginBottom: 10 }}>Maximum Annual Income</div>
          <div className="income-table-desktop"><TableContent /></div>
          {userLimit && <div style={{ fontSize: 12, color: 'var(--jade-dark)', marginBottom: 6, fontWeight: 600 }}>Your household ({userLimit.size}): <span style={{ color: 'var(--jade)' }}>${userLimit.limit.toLocaleString()}/yr max</span></div>}
          <button className="income-toggle-btn" onClick={() => setMobileOpen(o => !o)} aria-expanded={mobileOpen} aria-controls={`income-table-${programId}`}>{mobileOpen ? 'Hide' : 'Show'} all household sizes</button>
          <div id={`income-table-${programId}`} className={mobileOpen ? 'income-table-mobile-open' : ''} style={{ display: 'none' }}><TableContent /></div>
          {householdSize && <div style={{ fontSize: 11, color: 'var(--jade)', marginTop: 8, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 4 }}><span aria-hidden="true">▲</span> Your household size is highlighted</div>}
          {hardshipRanges.length > 0 && (
            <div style={{ marginTop: 14, paddingTop: 12, borderTop: '1px solid rgba(26,107,90,0.15)' }}>
              <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.07em', color: 'var(--jade-dark)', marginBottom: 6 }}>CMS Hardship Evaluation</div>
              <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginBottom: 8, lineHeight: 1.5 }}>May request a CMS Hardship Evaluation for households with incomes between:</div>
              <HardshipTableContent />
            </div>
          )}
        </div>
      );
    };

    const EligibilityFlags = ({ programId }) => {
      const criteria = PROGRAM_CRITERIA[programId]?.[1]?.[0];
      if (!criteria) return null;
      const flags = [];
      if (criteria.ageMin && criteria.ageMax) flags.push(`Age ${criteria.ageMin}–${criteria.ageMax}`);
      else if (criteria.ageMin) flags.push(`Age ${criteria.ageMin}+`);
      else if (criteria.ageMax) flags.push(`Age up to ${criteria.ageMax}`);
      if (criteria.disabled) flags.push('Disability may qualify');
      if (criteria.veteran) flags.push('Veteran status required or may qualify');
      if (criteria.tribalMember) flags.push('Tribal membership required or may qualify');
      if (criteria.fosterCare) flags.push('Foster care status may qualify');
      if (criteria.refugee) flags.push('Refugee/immigrant status may qualify');
      if (criteria.unemployed) flags.push('Unemployed status required');
      if (flags.length === 0) return null;
      return (
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, margin: '10px 0' }}>
          {flags.map(f => <span key={f} style={{ fontSize: 11, padding: '3px 8px', borderRadius: 99, background: 'rgba(26,107,90,0.08)', color: 'var(--jade-dark)', fontWeight: 600, border: '1px solid rgba(26,107,90,0.15)' }}>{f}</span>)}
        </div>
      );
    };

    const ProgramCard = ({ prog, householdSize, tagVariant }) => {
      const catLabel = CATEGORY_LABELS[prog.category] || prog.category;
      const tagClass = tagVariant === 'gray' ? 'tag tag-gray' : 'tag tag-green';
      const isContactLink = prog.link && prog.link.startsWith('Contact');
      return (
        <div className="program-card" style={{ display: 'flex', flexDirection: 'column' }}>
          <div style={{ marginBottom: 12 }}>
            <span className={tagClass} style={{ fontSize: 11, letterSpacing: '0.04em', textTransform: 'uppercase', fontWeight: 700 }}>{catLabel}</span>
          </div>
          <div style={{ marginBottom: 10, flex: 1 }}><DescLines text={prog.description} /></div>
          <EligibilityFlags programId={prog.id} />
          <IncomeLimitsTable programId={prog.id} householdSize={householdSize} />
          <div style={{ marginTop: 16, paddingTop: 14, borderTop: '1px solid var(--border)' }}>
            <h3 style={{ fontFamily: 'Fraunces, serif', fontSize: 15, fontWeight: 500, lineHeight: 1.35, marginBottom: 12, color: 'var(--text-primary)' }}>{prog.name}</h3>
            {isContactLink ? (
              <div style={{ background: 'rgba(26,107,90,0.06)', border: '1px solid rgba(26,107,90,0.15)', borderRadius: 8, padding: '8px 12px', fontSize: 12, color: 'var(--jade-dark)', fontWeight: 500 }}>{prog.link}</div>
            ) : (
              <a href={prog.link} target="_blank" rel="noreferrer" onClick={() => track('program_link_click', { program: prog.name, category: prog.category })} aria-label={`Apply or learn more about ${prog.name} (opens in new tab)`} className="btn-primary" style={{ fontSize: 12, padding: '9px 16px', width: '100%', justifyContent: 'center', textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: 8, boxSizing: 'border-box' }}>
                Apply / Learn more <Icon name="arrow" size={12} aria-hidden="true" />
              </a>
            )}
          </div>
        </div>
      );
    };

    const Quiz = ({ setView, setAnswers, onStepChange }) => {
      const [step, setStep] = useState(0);
      const [answers, setLocalAnswers] = useState({});
      const [selected, setSelected] = useState(null);
      const [selectedMultiple, setSelectedMultiple] = useState([]);
      const current = quizSteps[step];
      const progress = ((step + 1) / quizSteps.length) * 100;
      const isMultiSelect = current.id === "age" || current.id === "special_status" || current.id === "enrolled_programs";
      React.useEffect(() => {
        const handler = () => track('quiz_abandon', { step: step + 1, trigger: 'unload' });
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [step]);
      const handleOptionClick = (opt) => {
        if (isMultiSelect) setSelectedMultiple(prev => prev.includes(opt) ? prev.filter(item => item !== opt) : [...prev, opt]);
        else setSelected(opt);
      };
      const handleNext = () => {
        const newAnswers = isMultiSelect ? { ...answers, [current.id]: selectedMultiple } : { ...answers, [current.id]: selected };
        if (isMultiSelect && selectedMultiple.length === 0) return;
        if (!isMultiSelect && !selected) return;
        setLocalAnswers(newAnswers);
        if (step < quizSteps.length - 1) { track('quiz_step', { step: current.id }); setStep(step + 1); onStepChange(step + 1); setSelected(null); setSelectedMultiple([]); }
        else { track('quiz_complete'); setAnswers(newAnswers); setView("results"); }
      };
      const handleBack = () => {
        if (step === 0) { track('quiz_abandon', { step: 1 }); setView("landing"); return; }
        track('quiz_back', { from_step: step + 1 });
        setStep(step - 1);
        onStepChange(step - 1);
        const prevAnswer = answers[quizSteps[step - 1].id];
        const prevIsMulti = ["age", "special_status", "enrolled_programs"].includes(quizSteps[step - 1].id);
        if (prevIsMulti) { setSelectedMultiple(Array.isArray(prevAnswer) ? prevAnswer : []); setSelected(null); }
        else { setSelected(prevAnswer || null); setSelectedMultiple([]); }
      };
      return (
        <div id="main-content" style={{ minHeight: "calc(100vh - 64px)", background: "var(--cream)", display: "flex", flexDirection: "column", alignItems: "center", padding: "40px 24px" }}>
          <div style={{ width: "100%", maxWidth: 560, marginBottom: 40 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: "var(--text-muted)" }}>Step {step + 1} of {quizSteps.length}</span>
              <span style={{ fontSize: 13, color: "var(--text-muted)" }}>{Math.round(progress)}% complete</span>
            </div>
            <div className="progress-track"><div className="progress-fill" style={{ width: `${progress}%` }} /></div>
          </div>
          <div className="animate-fadeUp" style={{ width: "100%", maxWidth: 560 }}>
            <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 26, fontWeight: 500, lineHeight: 1.25, marginBottom: 8, letterSpacing: "-0.02em" }}>{current.title}</h2>
            <p style={{ color: "var(--text-secondary)", fontSize: 14, marginBottom: 16, lineHeight: 1.6 }}>{current.subtitle}</p>
            <div className="info-box" style={{ marginBottom: 24 }}>{current.explanation}</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {current.options.map((opt, i) => {
                const isSelected = isMultiSelect ? selectedMultiple.includes(opt) : selected === opt;
                return (
                  <div key={opt} role="button" tabIndex={0} aria-pressed={isSelected} className={`choice-card animate-fadeUp ${isSelected ? "selected" : ""}`} style={{ animationDelay: `${Math.min(i * 0.08, 0.3)}s` }} onClick={() => handleOptionClick(opt)} onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleOptionClick(opt); } }}>
                    <div className="choice-dot" aria-hidden="true">{isSelected && <Icon name="check" size={10} color="white" />}</div>
                    {opt}
                  </div>
                );
              })}
            </div>
            <div style={{ display: "flex", gap: 12, marginTop: 32, justifyContent: "space-between" }}>
              <button className="btn-ghost" onClick={handleBack} aria-label="Go back to previous step" style={{ display: "flex", alignItems: "center", gap: 6 }}><Icon name="back" size={16} aria-hidden="true" /> Back</button>
              <button className="btn-primary" onClick={handleNext} style={{ opacity: isMultiSelect ? (selectedMultiple.length > 0 ? 1 : 0.5) : (selected ? 1 : 0.5), cursor: isMultiSelect ? (selectedMultiple.length > 0 ? "pointer" : "not-allowed") : (selected ? "pointer" : "not-allowed") }} disabled={isMultiSelect ? selectedMultiple.length === 0 : !selected}>
                {step === quizSteps.length - 1 ? "See my results" : "Continue"} <Icon name="arrow" size={16} />
              </button>
            </div>
          </div>
          <div style={{ marginTop: 40, maxWidth: 560, width: "100%", textAlign: "center" }}>
            <p style={{ fontSize: 12, color: "var(--text-muted)" }}>🔒 Your answers are confidential and never shared.</p>
          </div>
        </div>
      );
    };

    const Results = ({ answers, setView }) => {
      const [selectedCategory, setSelectedCategory] = useState(null);
      const householdSizeMap = { "1 person": 1, "2 people": 2, "3 people": 3, "4 people": 4, "5 people": 5, "6 people": 6, "7+ people": 7 };
      const incomeMap = { "No income": 0, "Under $20,000": 10000, "$20,000\u2013$40,000": 30000, "$40,000\u2013$60,000": 50000, "$60,000\u2013$80,000": 70000, "$80,000\u2013$120,000": 100000, "$120,000\u2013$180,000": 150000, "Over $180,000": 200000 };
      const householdSize = householdSizeMap[answers.household_size] || 1;
      const annualIncome = incomeMap[answers.annual_income] || 0;
      const specialStatus = Array.isArray(answers.special_status) ? answers.special_status : [answers.special_status].filter(Boolean);
      const enrolledRaw = Array.isArray(answers.enrolled_programs) ? answers.enrolled_programs : [];
      const enrolledPrograms = enrolledRaw.map(p => ENROLLED_KEYS[p]).filter(Boolean);
      const profile = {
        ageArr: Array.isArray(answers.age) ? answers.age : [answers.age].filter(Boolean),
        householdSize, annualIncome,
        isVeteran: specialStatus.some(s => s.includes("Veteran")),
        isRefugee: specialStatus.some(s => s.includes("Refugee")),
        isDisabled: specialStatus.some(s => s.includes("Disabled") || s.includes("Disability")),
        isFosterCare: specialStatus.some(s => s.includes("Foster")),
        isPregnant: specialStatus.some(s => s.includes("Pregnant")),
        hasChildren: specialStatus.some(s => s.includes("children")),
        isTribal: specialStatus.some(s => s.includes("tribal") || s.includes("Tribal")),
        isDVSurvivor: specialStatus.some(s => s.includes("Domestic violence")),
        needsLegal: specialStatus.some(s => s.includes("legal assistance")),
        isUnemployed: (answers.employment || "").includes("Unemployed") || (answers.employment || "").includes("Unable to work"),
        isEmployedFullTime: (answers.employment || "") === "Employed full-time",
        isPartTime: (answers.employment || "") === "Employed part-time",
        isRetired: (answers.employment || "") === "Retired",
        isStudent: specialStatus.some(s => s.includes("student")),
        isHomeowner: specialStatus.some(s => s.includes("Homeowner")),
        enrolledPrograms,
      };
      const tieredPrograms = Object.values(PROGRAMS).map(prog => ({ ...prog, tier: getProgramTier(prog.id, profile) })).filter(p => p.tier !== null);
      const likelyPrograms = tieredPrograms.filter(p => p.tier === 'likely');
      const mayPrograms = tieredPrograms.filter(p => p.tier === 'may');
      const allCategories = [...new Set(tieredPrograms.map(p => p.category))].sort();
      const filterProgs = (list) => selectedCategory ? list.filter(p => p.category === selectedCategory) : list;
      const displayLikely = filterProgs(likelyPrograms);
      const displayMay = filterProgs(mayPrograms);
      React.useEffect(() => {
        track('results_shown', { likely_count: likelyPrograms.length, maybe_count: mayPrograms.length, total: tieredPrograms.length, zero_results: tieredPrograms.length === 0 });
      }, []);
      const SectionHeader = ({ tier, count }) => (
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, margin: '36px 0 20px', paddingBottom: 14, borderBottom: `2px solid ${tier === 'likely' ? 'var(--jade)' : 'var(--amber)'}` }}>
          <div style={{ width: 32, height: 32, borderRadius: 8, flexShrink: 0, background: tier === 'likely' ? 'var(--jade)' : 'var(--amber)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon name={tier === 'likely' ? 'check' : 'spark'} size={15} color="white" />
          </div>
          <div>
            <h3 style={{ fontFamily: 'Fraunces, serif', fontSize: 18, fontWeight: 500, margin: 0, color: 'var(--text-primary)' }}>
              {tier === 'likely' ? 'Likely Eligible' : 'May Also Qualify'}
              <span style={{ fontFamily: 'Plus Jakarta Sans, sans-serif', fontSize: 13, fontWeight: 600, marginLeft: 10, color: tier === 'likely' ? 'var(--jade)' : 'var(--terracotta)' }}>{count} program{count !== 1 ? 's' : ''}</span>
            </h3>
            <p style={{ fontSize: 12, color: 'var(--text-muted)', margin: '3px 0 0', lineHeight: 1.4 }}>
              {tier === 'likely' ? 'Based on your answers, you appear to meet the eligibility criteria for these programs.' : "You may qualify through criteria the quiz couldn't fully verify. Contact each program to confirm."}
            </p>
          </div>
        </div>
      );
      return (
        <div id="main-content" style={{ background: "var(--cream)", minHeight: "calc(100vh - 64px)", padding: "40px 24px" }}>
          <div aria-live="polite" aria-atomic="true" style={{ position: "absolute", left: "-9999px" }}>{tieredPrograms.length} programs found. {likelyPrograms.length} likely eligible, {mayPrograms.length} worth checking.</div>
          <div style={{ maxWidth: 1200, margin: "0 auto" }}>
            <div className="animate-fadeUp" style={{ marginBottom: 32 }}>
              <div className="tag tag-green" style={{ marginBottom: 12 }}><Icon name="check" size={12} aria-hidden="true" /> Your results are ready</div>
              <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 36, fontWeight: 500, letterSpacing: "-0.03em", lineHeight: 1.1, marginBottom: 8 }}>
                You may qualify for <em style={{ color: "var(--jade)", fontStyle: "italic" }}>{likelyPrograms.length} programs</em>
                {mayPrograms.length > 0 && <span style={{ fontSize: 22, color: 'var(--text-secondary)', fontStyle: 'normal' }}> + {mayPrograms.length} to check</span>}
              </h2>
              <p style={{ color: "var(--text-secondary)", fontSize: 15 }}>Based on your household of {householdSize} with annual income of ${annualIncome.toLocaleString()}</p>
            </div>
            <div className="disclaimer-box">
              <div className="disclaimer-title">⚠️ Important Disclaimer</div>
              These results are an estimate based on general eligibility criteria. Different programs define "household" and "income" differently and may have additional requirements. These results do not guarantee your eligibility. Please verify by contacting each program directly. Results are intentionally over-inclusive — we would rather show you a program you may not qualify for than miss one you do.
            </div>
            <div className="animate-fadeUp delay-1" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginBottom: 32 }}>
              {[{ label: "Household size", val: householdSize }, { label: "Annual income", val: `$${annualIncome.toLocaleString()}` }, { label: "Likely eligible", val: likelyPrograms.length }, { label: "Worth checking", val: mayPrograms.length }].map(s => (
                <div key={s.label} className="stat-card animate-fadeUp"><div className="stat-value">{s.val}</div><div className="stat-label">{s.label}</div></div>
              ))}
            </div>
            {tieredPrograms.length === 0 ? (
              <div className="card" style={{ textAlign: "center", padding: "40px" }}>
                <p style={{ color: "var(--text-secondary)", marginBottom: 16 }}>Based on your answers, you may not currently qualify. However, you can:</p>
                <button className="btn-primary" onClick={() => { track('results_to_directory'); track('browse_directory'); setView("directory"); }}>Browse all programs <Icon name="arrow" size={16} /></button>
              </div>
            ) : (
              <div>
                <div className="filter-buttons animate-fadeUp delay-1">
                  <button className={`filter-btn ${!selectedCategory ? 'active' : ''}`} onClick={() => setSelectedCategory(null)}>All ({tieredPrograms.length})</button>
                  {allCategories.map(cat => {
                    const count = tieredPrograms.filter(p => p.category === cat).length;
                    return <button key={cat} className={`filter-btn ${selectedCategory === cat ? 'active' : ''}`} onClick={() => { track('category_filter', { category: cat, view: 'results' }); setSelectedCategory(cat); }}>{cat.charAt(0).toUpperCase() + cat.slice(1)} ({count})</button>;
                  })}
                </div>
                {selectedCategory && displayLikely.length === 0 && displayMay.length === 0 && (
                  <div style={{ textAlign: 'center', padding: '48px 24px', background: 'var(--warm-white)', borderRadius: 16, border: '1px solid var(--border)', marginTop: 24 }}>
                    <div style={{ fontSize: 32, marginBottom: 12 }}>🔍</div>
                    <h3 style={{ fontFamily: 'Fraunces, serif', fontSize: 20, fontWeight: 500, marginBottom: 8 }}>No {selectedCategory} programs matched your answers</h3>
                    <p style={{ color: 'var(--text-secondary)', fontSize: 14, marginBottom: 20, lineHeight: 1.6 }}>You may still find helpful programs in other categories, or explore the full directory for more options.</p>
                    <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
                      <button className="btn-secondary" onClick={() => setSelectedCategory(null)}>View all my results</button>

    function App() {
      const [view, setView] = useState("landing");
      const [answers, setAnswers] = useState(null);
      const [directoryCategory, setDirectoryCategory] = useState(null);
      const [quizStep, setQuizStep] = useState(0);

      return (
        <div>
          <Nav view={view} setView={setView} quizStep={quizStep} />
          {view === "landing" && <LandingPage setView={setView} goToDirectory={goToDirectory} />}
          {view === "quiz" && <Quiz setView={setView} setAnswers={setAnswers} onStepChange={setQuizStep} />}
          {view === "results" && answers && <Results answers={answers} setView={setView} />}
          {view === "directory" && <Directory key={directoryCategory} setView={setView} initialCategory={directoryCategory} />}
          {view === "about" && <AboutUs setView={setView} />}
          <SiteFooter />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
