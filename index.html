<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benefits Navigator - San Diego County</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="data.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --jade: #1a6b5a;
      --jade-light: #2a8f76;
      --jade-dark: #0f4038;
      --cream: #faf6ef;
      --warm-white: #fffdf9;
      --terracotta: #c4622d;
      --amber: #e8a830;
      --sand: #e8dcc8;
      --text-primary: #1c1a17;
      --text-secondary: #5c5649;
      --text-muted: #9a9082;
      --border: #e0d6c6;
      --shadow-sm: 0 1px 4px rgba(28,26,23,0.08);
      --shadow-md: 0 4px 20px rgba(28,26,23,0.12);
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--cream); color: var(--text-primary); }
    h1, h2, h3 { font-family: 'Fraunces', serif; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeUp { animation: fadeUp 0.5s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: var(--jade); color: white; border: none; border-radius: 99px; padding: 14px 28px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-family: 'Plus Jakarta Sans', sans-serif; }
    .btn-primary:hover { background: var(--jade-light); }
    .btn-secondary { display: inline-flex; align-items: center; gap: 8px; background: transparent; color: var(--jade); border: 1.5px solid var(--jade); border-radius: 99px; padding: 13px 24px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-family: 'Plus Jakarta Sans', sans-serif; }
    .btn-secondary:hover { background: rgba(26,107,90,0.06); }
    .btn-ghost { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; padding: 8px 12px; border-radius: 6px; font-family: 'Plus Jakarta Sans', sans-serif; }
    .nav { position: sticky; top: 0; z-index: 100; background: rgba(250,246,239,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .nav-inner { max-width: 1120px; margin: 0 auto; height: 64px; display: flex; align-items: center; }
    .tag { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; }
    .tag-green { background: rgba(26,107,90,0.1); color: var(--jade-dark); }
    .tag-gray { background: var(--sand); color: var(--text-secondary); }
    .input { width: 100%; background: var(--warm-white); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 16px; font-size: 15px; color: var(--text-primary); font-family: 'Plus Jakarta Sans', sans-serif; outline: none; }
    .input:focus { border-color: var(--jade); box-shadow: 0 0 0 3px rgba(26,107,90,0.1); }
    .choice-card { border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.2s ease; background: var(--warm-white); display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 500; }
    .choice-card:hover { border-color: var(--jade); background: rgba(26,107,90,0.03); }
    .choice-card.selected { border-color: var(--jade); background: rgba(26,107,90,0.07); color: var(--jade-dark); }
    .choice-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .choice-card.selected .choice-dot { border-color: var(--jade); background: var(--jade); }
    .progress-track { width: 100%; height: 6px; background: var(--sand); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--jade), var(--jade-light)); border-radius: 99px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
    .hero-bg { background: radial-gradient(ellipse 80% 60% at 60% -10%, rgba(26,107,90,0.12) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 0% 80%, rgba(232,168,48,0.1) 0%, transparent 50%), var(--cream); }
    .stat-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; }
    .stat-value { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 500; color: var(--text-primary); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
    .info-box { background: rgba(26,107,90,0.07); border: 1px solid rgba(26,107,90,0.2); border-radius: 10px; padding: 14px 16px; font-size: 13.5px; color: var(--jade-dark); line-height: 1.6; }
    .disclaimer-box { background: rgba(232,168,48,0.08); border-left: 4px solid var(--amber); padding: 16px; border-radius: 8px; font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin: 24px 0; }
    .disclaimer-title { font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .program-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: var(--shadow-sm); transition: all 0.25s ease; display: flex; flex-direction: column; }
    .program-card:hover { box-shadow: var(--shadow-md); transform: translateY(-4px); border-color: var(--jade); }
    .program-card-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(26,107,90,0.1); display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .program-card-title { font-weight: 700; font-size: 15px; margin-bottom: 8px; line-height: 1.3; }
    .program-card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 12px; }
    .program-card-cat { margin-bottom: 12px; }
    .criteria-section { margin: 12px 0; padding: 10px; background: rgba(26,107,90,0.03); border-radius: 8px; border: 1px solid rgba(26,107,90,0.1); }
    .criteria-toggle { background: none; border: none; padding: 0; cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 12px; color: var(--jade); font-family: 'Plus Jakarta Sans', sans-serif; }
    .criteria-toggle:hover { color: var(--jade-light); }
    .criteria-list { margin-top: 8px; font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
    .criteria-item { margin: 4px 0; padding-left: 14px; position: relative; }
    .criteria-item::before { content: "•"; position: absolute; left: 0; color: var(--jade); font-weight: bold; }
    .program-card-link { margin-top: auto; }
    .filter-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .filter-btn { background: var(--warm-white); color: var(--text-secondary); border: 1px solid var(--border); padding: 8px 16px; border-radius: 99px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; }
    .filter-btn:hover { border-color: var(--jade); background: rgba(26,107,90,0.03); }
    .filter-btn.active { background: var(--jade); color: white; border-color: var(--jade); }
    .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: var(--shadow-sm); }
    .card-hover { transition: all 0.2s ease; cursor: pointer; }
    .card-hover:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--jade); }
    /* Skip to content */
    .skip-link { position: absolute; top: -40px; left: 0; background: var(--jade); color: white; padding: 8px 16px; z-index: 9999; font-weight: 600; border-radius: 0 0 8px 0; transition: top 0.2s; }
    .skip-link:focus { top: 0; }
    /* Focus visible for keyboard nav */
    button:focus-visible, a:focus-visible { outline: 3px solid var(--jade); outline-offset: 2px; border-radius: 4px; }
    .choice-card:focus-visible { outline: 3px solid var(--jade); outline-offset: 2px; }
    /* Mobile income table toggle */
    .income-toggle-btn { display: none; background: none; border: 1px solid rgba(26,107,90,0.2); border-radius: 6px; padding: 6px 12px; font-size: 12px; color: var(--jade); font-family: 'Plus Jakarta Sans', sans-serif; cursor: pointer; font-weight: 600; margin: 8px 0; width: 100%; }
    @media (max-width: 600px) {
      .income-toggle-btn { display: flex; align-items: center; justify-content: center; gap: 6px; }
      .income-table-desktop { display: none; }
      .income-table-mobile-open { display: block !important; }
      .results-grid { grid-template-columns: 1fr; }
      .program-card { padding: 16px; }
    }
    /* Print styles */
    @media print {
      .nav, .filter-buttons, .btn-primary, .btn-secondary, .btn-ghost, .disclaimer-box, .no-print { display: none !important; }
      .program-card { break-inside: avoid; border: 1px solid #ccc; box-shadow: none; margin-bottom: 12px; }
      .results-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      body { background: white; }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const Icon = ({ name, size = 18, color = "currentColor", ariaHidden = true }) => {
      const icons = {
        leaf: <svg aria-hidden="true" focusable="false" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path d="M2 22 16 8"/><path d="M8.5 2C4 2 2 6 2 10s2 8 8.5 8C16 18 22 14 22 7c0-5-4-5-6-5-2.5 0-5 1.5-7.5 0z"/></svg>,
        home: <svg aria-hidden="true" focusable="false" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
        heart: <svg aria-hidden="true" focusable="false" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
        dollar: <svg aria-hidden="true" focusable="false" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
        arrow: <svg aria-hidden="true" focusable="false" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
        check: <svg aria-hidden="true" focusable="false" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>,
        back: <svg aria-hidden="true" focusable="false" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
        spark: <svg aria-hidden="true" focusable="false" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>,
        file: <svg aria-hidden="true" focusable="false" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/></svg>,
        chevron: <svg aria-hidden="true" focusable="false" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>,
      };
      return icons[name] || null;
    };

    // All 86 programs from spreadsheet


    // Program Criteria Data from spreadsheet - includes 8 fields: age, disability, refugee, unemployed, tribalMember, fosterCare, veteran, other




    // Map enrollment answer strings → internal keys
    const ENROLLED_KEYS = {
      "CalFresh or Supplemental Nutrition Assistance Program (SNAP)": "calfresh",
      "Medi-Cal (Medicaid)": "medi-cal",
      "Medicare": "medicare",
      "Supplemental Security Income (SSI) and State Supplementary Program (SSP)": "ssi",
      "CalWORKs or Temporary Assistance for Needy Families (TANF)": "calworks",
      "Low Income Home Energy Assistance Program (LIHEAP)": "liheap",
      "California Alternate Rates for Energy (CARE) or Family Electric Rate Assistance Program (FERA)": "care-fera",
      "Section 8 / Federal Public Housing": "section8",
      "Women, Infants, and Children (WIC)": "wic",
      "San Diego County General Relief": "general-relief",
    };

    // Check if ANY selected age group overlaps a requirement (supports multi-select)
    const ageQualifies = (ageArr, ageMin, ageMax) => {
      const ranges = { "Under 6":[0,5], "6–13":[6,13], "13–17":[13,17], "18":[18,18], "19–25":[19,25], "26–59":[26,59], "60–61":[60,61], "62–64":[62,64], "65+":[65,150] };
      const arr = Array.isArray(ageArr) ? ageArr : [ageArr].filter(Boolean);
      if (arr.length === 0) return true;
      return arr.some(a => {
        const [lo, hi] = ranges[a] || [18,59];
        if (ageMin !== undefined && hi < ageMin) return false;
        if (ageMax !== undefined && lo > ageMax) return false;
        return true;
      });
    };

    // Check one qualification path against user profile
    const checkPath = (path, progId, profile) => {
      if (path.income) {
        const criteria = PROGRAM_CRITERIA[progId]?.[profile.householdSize];
        if (criteria && criteria[0]?.incomeLimit) {
          if (profile.annualIncome > criteria[0].incomeLimit) return false;
        } else {
          return false; // No income limit data available — cannot confirm eligibility
        }
      }
      if (path.ageMin !== undefined || path.ageMax !== undefined) {
        if (!ageQualifies(profile.ageArr, path.ageMin, path.ageMax)) return false;
      }
      if (path.disabled   && !profile.isDisabled)   return false;
      if (path.veteran    && !profile.isVeteran)     return false;
      if (path.pregnant   && !profile.isPregnant)    return false;
      if (path.hasChildren && !profile.hasChildren)  return false;
      if (path.fosterCare && !profile.isFosterCare)  return false;
      if (path.refugee    && !profile.isRefugee)     return false;
      if (path.tribal     && !profile.isTribal)      return false;
      if (path.unemployed && !profile.isUnemployed)  return false;
      if (path.dvSurvivor        && !profile.isDVSurvivor)    return false;
      if (path.needsLegal          && !profile.needsLegal)       return false;
      if (path.notEmployedFullTime && profile.isEmployedFullTime) return false;
      if (path.enrolledAny && path.enrolledAny.length > 0) {
        if (!path.enrolledAny.some(k => profile.enrolledPrograms.includes(k))) return false;
      }
      return true;
    };





    // Check if profile has at least one qualifying signal for gated categories
    const hasGateQualifyingSignal = (progId, profile) => {
      if (profile.isDisabled)  return true;
      if (profile.isPregnant)  return true;
      if (profile.hasChildren) return true;
      if (profile.isRefugee)   return true;
      if (profile.isTribal)    return true;
      if (profile.isVeteran)   return true;
      if (profile.needsLegal)  return true;
      if (profile.enrolledPrograms.length > 0) return true;
      const criteria = PROGRAM_CRITERIA[progId]?.[profile.householdSize];
      if (criteria && criteria[0]?.incomeLimit && profile.annualIncome <= criteria[0].incomeLimit) return true;
      const paths = QUALIFY_PATHS[progId] || [];
      return paths.some(p =>
        (p.ageMin !== undefined || p.ageMax !== undefined) &&
        ageQualifies(profile.ageArr, p.ageMin, p.ageMax)
      );
    };

    // Return 'likely', 'may', or null (exclude)
    const getProgramTier = (progId, profile) => {
      const prog = PROGRAMS[progId];
      if (prog && GATED_CATEGORIES.has(prog.category) && !GATE_EXEMPT.has(progId)) {
        if (!hasGateQualifyingSignal(progId, profile)) return null;
      }
      const paths = QUALIFY_PATHS[progId];
      if (!paths || paths.length === 0) return 'may';
      const hasLikely = paths.filter(p => p.tier === 'likely').some(p => checkPath(p, progId, profile));
      if (hasLikely) return 'likely';
      const hasMay = paths.filter(p => p.tier === 'may').some(p => checkPath(p, progId, profile));
      if (hasMay) return 'may';
      return null;
    };



    // Category display labels
    const CATEGORY_LABELS = {
      food: 'Food',
      healthcare: 'Healthcare',
      income: 'Income',
      housing: 'Housing',
      utility: 'Utilities',
      transportation: 'Transportation',
      legal: 'Legal',
      'day care': 'Day Care',
      caretaker: 'Caretaker',
      entertainment: 'Entertainment',
      taxes: 'Taxes',
    };

    // Render multi-line description as structured list
    const DescLines = ({ text }) => {
      const lines = text.split('\n').filter(l => l.trim());
      if (lines.length <= 1) {
        return <p style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.6, margin: 0 }}>{text}</p>;
      }
      return (
        <div style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.6 }}>
          {lines.map((line, i) => {
            const trimmed = line.trim();
            const isSubHeader = trimmed.endsWith(':') && trimmed.length < 80;
            if (isSubHeader) {
              return <div key={i} style={{ fontWeight: 700, color: 'var(--text-primary)', marginTop: i > 0 ? 10 : 0, fontSize: 12 }}>{trimmed}</div>;
            }
            const isBullet = trimmed.startsWith('•');
            return (
              <div key={i} style={{ display: 'flex', gap: 6, marginTop: i > 0 ? 3 : 0, paddingLeft: isBullet ? 0 : 2 }}>
                {!isBullet && i > 0 && <span style={{ color: 'var(--jade)', flexShrink: 0 }}>•</span>}
                <span>{isBullet ? trimmed.substring(1).trim() : trimmed}</span>
              </div>
            );
          })}
        </div>
      );
    };

    // Income limits table for a program
    const IncomeLimitsTable = ({ programId, householdSize }) => {
      const [mobileOpen, setMobileOpen] = React.useState(false);
      const incomeLimits = [];
      for (let sz = 1; sz <= 7; sz++) {
        const criteria = PROGRAM_CRITERIA[programId]?.[sz];
        if (criteria && criteria[0]?.incomeLimit) {
          incomeLimits.push({ size: sz, limit: criteria[0].incomeLimit });
        }
      }
      if (incomeLimits.length === 0) return null;

      const userLimit = householdSize ? incomeLimits.find(l => l.size === householdSize) : null;

      const TableContent = () => (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '3px 8px' }}>
          {incomeLimits.map(({ size, limit }) => {
            const isUser = householdSize && size === householdSize;
            return (
              <div key={size} style={{
                display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                padding: '5px 8px', borderRadius: 6, fontSize: 12,
                background: isUser ? 'var(--jade)' : 'rgba(0,0,0,0.03)',
                color: isUser ? 'white' : 'var(--text-secondary)',
                fontWeight: isUser ? 700 : 400,
                border: isUser ? 'none' : '1px solid transparent',
              }}>
                <span>{size === 7 ? '7+' : size} {size === 1 ? 'person' : 'people'}</span>
                <span>${limit.toLocaleString()}</span>
              </div>
            );
          })}
        </div>
      );

      return (
        <div style={{ margin: '12px 0', padding: '12px', background: 'rgba(26,107,90,0.04)', borderRadius: 10, border: '1px solid rgba(26,107,90,0.12)' }}>
          <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.07em', color: 'var(--jade-dark)', marginBottom: 10 }}>
            Maximum Annual Income
          </div>
          {/* Desktop: always show full table */}
          <div className="income-table-desktop">
            <TableContent />
          </div>
          {/* Mobile: show your household size, toggle for full table */}
          {userLimit && (
            <div style={{ fontSize: 12, color: 'var(--jade-dark)', marginBottom: 6, fontWeight: 600 }}>
              Your household ({userLimit.size}): <span style={{ color: 'var(--jade)' }}>${userLimit.limit.toLocaleString()}/yr max</span>
            </div>
          )}
          <button
            className="income-toggle-btn"
            onClick={() => setMobileOpen(o => !o)}
            aria-expanded={mobileOpen}
            aria-controls={`income-table-${programId}`}
          >
            {mobileOpen ? 'Hide' : 'Show'} all household sizes
          </button>
          <div id={`income-table-${programId}`} className={mobileOpen ? 'income-table-mobile-open' : ''} style={{ display: 'none' }}>
            <TableContent />
          </div>
          {householdSize && (
            <div style={{ fontSize: 11, color: 'var(--jade)', marginTop: 8, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 4 }}>
              <span aria-hidden="true">▲</span> Your household size is highlighted
            </div>
          )}
        </div>
      );
    };

    // Special eligibility flags display
    const EligibilityFlags = ({ programId }) => {
      const criteria = PROGRAM_CRITERIA[programId]?.[1]?.[0];
      if (!criteria) return null;
      const flags = [];
      if (criteria.ageMin && criteria.ageMax) flags.push(`Age ${criteria.ageMin}–${criteria.ageMax}`);
      else if (criteria.ageMin) flags.push(`Age ${criteria.ageMin}+`);
      else if (criteria.ageMax) flags.push(`Age up to ${criteria.ageMax}`);
      if (criteria.disabled) flags.push('Disability may qualify');
      if (criteria.veteran) flags.push('Veteran status required or may qualify');
      if (criteria.tribalMember) flags.push('Tribal membership required or may qualify');
      if (criteria.fosterCare) flags.push('Foster care status may qualify');
      if (criteria.refugee) flags.push('Refugee/immigrant status may qualify');
      if (criteria.unemployed) flags.push('Unemployed status required');
      if (flags.length === 0) return null;
      return (
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, margin: '10px 0' }}>
          {flags.map(f => (
            <span key={f} style={{ fontSize: 11, padding: '3px 8px', borderRadius: 99, background: 'rgba(26,107,90,0.08)', color: 'var(--jade-dark)', fontWeight: 600, border: '1px solid rgba(26,107,90,0.15)' }}>{f}</span>
          ))}
        </div>
      );
    };

    // New Program Card: category → description → criteria → name → button
    const ProgramCard = ({ prog, householdSize, tagVariant }) => {
      const catLabel = CATEGORY_LABELS[prog.category] || prog.category;
      const tagClass = tagVariant === 'gray' ? 'tag tag-gray' : 'tag tag-green';
      const isContactLink = prog.link && prog.link.startsWith('Contact');

      return (
        <div className="program-card" style={{ display: 'flex', flexDirection: 'column' }}>
          {/* 1. Category type at top */}
          <div style={{ marginBottom: 12 }}>
            <span className={tagClass} style={{ fontSize: 11, letterSpacing: '0.04em', textTransform: 'uppercase', fontWeight: 700 }}>{catLabel}</span>
          </div>

          {/* 2. Description from Excel */}
          <div style={{ marginBottom: 10, flex: 1 }}>
            <DescLines text={prog.description} />
          </div>

          {/* 3. Eligibility criteria */}
          <EligibilityFlags programId={prog.id} />
          <IncomeLimitsTable programId={prog.id} householdSize={householdSize} />

          {/* 4. Program name at bottom */}
          <div style={{ marginTop: 16, paddingTop: 14, borderTop: '1px solid var(--border)' }}>
            <h3 style={{ fontFamily: 'Fraunces, serif', fontSize: 15, fontWeight: 500, lineHeight: 1.35, marginBottom: 12, color: 'var(--text-primary)' }}>
              {prog.name}
            </h3>

            {/* 5. Apply / Learn More button */}
            {isContactLink ? (
              <div style={{ background: 'rgba(26,107,90,0.06)', border: '1px solid rgba(26,107,90,0.15)', borderRadius: 8, padding: '8px 12px', fontSize: 12, color: 'var(--jade-dark)', fontWeight: 500 }}>
                {prog.link}
              </div>
            ) : (
              <a
                href={prog.link}
                target="_blank"
                rel="noreferrer"
                aria-label={`Apply or learn more about ${prog.name} (opens in new tab)`}
                className="btn-primary"
                style={{ fontSize: 12, padding: '9px 16px', width: '100%', justifyContent: 'center', textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: 8, boxSizing: 'border-box' }}
              >
                Apply / Learn more <Icon name="arrow" size={12} aria-hidden="true" />
              </a>
            )}
          </div>
        </div>
      );
    };

    // Quiz Component
    const Quiz = ({ setView, setAnswers }) => {
      const [step, setStep] = useState(0);
      const [answers, setLocalAnswers] = useState({});
      const [selected, setSelected] = useState(null);
      const [selectedMultiple, setSelectedMultiple] = useState([]);

      const current = quizSteps[step];
      const progress = ((step + 1) / quizSteps.length) * 100;
      const isMultiSelect = current.id === "age" || current.id === "special_status" || current.id === "enrolled_programs";

      const handleOptionClick = (opt) => {
        if (isMultiSelect) {
          setSelectedMultiple(prev => 
            prev.includes(opt) 
              ? prev.filter(item => item !== opt)
              : [...prev, opt]
          );
        } else {
          setSelected(opt);
        }
      };

      const handleNext = () => {
        const newAnswers = isMultiSelect 
          ? { ...answers, [current.id]: selectedMultiple }
          : { ...answers, [current.id]: selected };
        
        if (isMultiSelect && selectedMultiple.length === 0) return;
        if (!isMultiSelect && !selected) return;
        
        setLocalAnswers(newAnswers);
        
        if (step < quizSteps.length - 1) {
          setStep(step + 1);
          setSelected(null);
          setSelectedMultiple([]);
        } else {
          setAnswers(newAnswers);
          setView("results");
        }
      };

      const handleBack = () => {
        if (step === 0) { setView("landing"); return; }
        setStep(step - 1);
        const prevAnswer = answers[quizSteps[step - 1].id];
        const prevIsMulti = ["age", "special_status", "enrolled_programs"].includes(quizSteps[step - 1].id);
        if (prevIsMulti) {
          setSelectedMultiple(Array.isArray(prevAnswer) ? prevAnswer : []);
          setSelected(null);
        } else {
          setSelected(prevAnswer || null);
          setSelectedMultiple([]);
        }
      };

      return (
        <div id="main-content" style={{ minHeight: "calc(100vh - 64px)", background: "var(--cream)", display: "flex", flexDirection: "column", alignItems: "center", padding: "40px 24px" }}>
          <div style={{ width: "100%", maxWidth: 560, marginBottom: 40 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: "var(--text-muted)" }}>Step {step + 1} of {quizSteps.length}</span>
              <span style={{ fontSize: 13, color: "var(--text-muted)" }}>{Math.round(progress)}% complete</span>
            </div>
            <div className="progress-track">
              <div className="progress-fill" style={{ width: `${progress}%` }} />
            </div>
          </div>

          <div className="animate-fadeUp" style={{ width: "100%", maxWidth: 560 }}>
            <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 26, fontWeight: 500, lineHeight: 1.25, marginBottom: 8, letterSpacing: "-0.02em" }}>
              {current.title}
            </h2>
            <p style={{ color: "var(--text-secondary)", fontSize: 14, marginBottom: 16, lineHeight: 1.6 }}>
              {current.subtitle}
            </p>
            
            <div className="info-box" style={{ marginBottom: 24 }}>
              {current.explanation}
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {current.options.map((opt, i) => {
                const isSelected = isMultiSelect 
                  ? selectedMultiple.includes(opt)
                  : selected === opt;
                
                return (
                  <div
                    key={opt}
                    role="button"
                    tabIndex={0}
                    aria-pressed={isSelected}
                    className={`choice-card animate-fadeUp ${isSelected ? "selected" : ""}`}
                    style={{ animationDelay: `${Math.min(i * 0.08, 0.3)}s` }}
                    onClick={() => handleOptionClick(opt)}
                    onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleOptionClick(opt); } }}
                  >
                    <div className="choice-dot" aria-hidden="true">
                      {isSelected && <Icon name="check" size={10} color="white" />}
                    </div>
                    {opt}
                  </div>
                );
              })}
            </div>

            <div style={{ display: "flex", gap: 12, marginTop: 32, justifyContent: "space-between" }}>
              <button className="btn-ghost" onClick={handleBack} aria-label="Go back to previous step" style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <Icon name="back" size={16} aria-hidden="true" /> Back
              </button>
              <button
                className="btn-primary"
                onClick={handleNext}
                style={{ opacity: isMultiSelect ? (selectedMultiple.length > 0 ? 1 : 0.5) : (selected ? 1 : 0.5), cursor: isMultiSelect ? (selectedMultiple.length > 0 ? "pointer" : "not-allowed") : (selected ? "pointer" : "not-allowed") }}
                disabled={isMultiSelect ? selectedMultiple.length === 0 : !selected}
              >
                {step === quizSteps.length - 1 ? "See my results" : "Continue"} <Icon name="arrow" size={16} />
              </button>
            </div>
          </div>

          <div style={{ marginTop: 40, maxWidth: 560, width: "100%", textAlign: "center" }}>
            <p style={{ fontSize: 12, color: "var(--text-muted)" }}>
              🔒 Your answers are confidential and never shared.
            </p>
          </div>
        </div>
      );
    };

    // Results Component
    const Results = ({ answers, setView }) => {
      const [selectedCategory, setSelectedCategory] = useState(null);

      const householdSizeMap = { "1 person": 1, "2 people": 2, "3 people": 3, "4 people": 4, "5 people": 5, "6 people": 6, "7+ people": 7 };
      const incomeMap = { "No income": 0, "Under $20,000": 10000, "$20,000\u2013$40,000": 30000, "$40,000\u2013$60,000": 50000, "$60,000\u2013$80,000": 70000, "$80,000\u2013$120,000": 100000, "$120,000\u2013$180,000": 150000, "Over $180,000": 200000 };

      const householdSize = householdSizeMap[answers.household_size] || 1;
      const annualIncome  = incomeMap[answers.annual_income] || 0;
      const specialStatus = Array.isArray(answers.special_status) ? answers.special_status : [answers.special_status].filter(Boolean);
      const enrolledRaw   = Array.isArray(answers.enrolled_programs) ? answers.enrolled_programs : [];
      const enrolledPrograms = enrolledRaw.map(p => ENROLLED_KEYS[p]).filter(Boolean);

      const profile = {
        ageArr: Array.isArray(answers.age) ? answers.age : [answers.age].filter(Boolean),
        householdSize,
        annualIncome,
        isVeteran:    specialStatus.some(s => s.includes("Veteran")),
        isRefugee:    specialStatus.some(s => s.includes("Refugee")),
        isDisabled:   specialStatus.some(s => s.includes("Disabled") || s.includes("Disability")),
        isFosterCare: specialStatus.some(s => s.includes("Foster")),
        isPregnant:   specialStatus.some(s => s.includes("Pregnant")),
        hasChildren:  specialStatus.some(s => s.includes("children")),
        isTribal:     specialStatus.some(s => s.includes("tribal") || s.includes("Tribal")),
        isDVSurvivor: specialStatus.some(s => s.includes("Domestic violence")),
        needsLegal:   specialStatus.some(s => s.includes("legal assistance")),
        isUnemployed:       (answers.employment || "").includes("Unemployed") || (answers.employment || "").includes("Unable to work"),
        isEmployedFullTime: (answers.employment || "") === "Employed full-time",
        enrolledPrograms,
      };


      // Two-pass scoring to handle dependencies dynamically
      const firstPass = Object.values(PROGRAMS)
        .filter(p => !p.dependsOnProgram)
        .map(prog => ({ ...prog, tier: getProgramTier(prog.id, profile) }))
        .filter(p => p.tier !== null);

      const tieredPrograms = [...firstPass];

      const dependentPrograms = Object.values(PROGRAMS).filter(p => p.dependsOnProgram);
      for (const p of dependentPrograms) {
        const dependentProgTier = (firstPass.find(prog => prog.id === p.dependsOnProgram) || {}).tier;
        if (dependentProgTier) {
          const resultTier = getProgramTier(p.id, profile) || dependentProgTier;
          tieredPrograms.push({ ...p, tier: resultTier });
        }
      }
      tieredPrograms.sort((a, b) => a.id - b.id);


      const likelyPrograms = tieredPrograms.filter(p => p.tier === 'likely');
      const mayPrograms    = tieredPrograms.filter(p => p.tier === 'may');

      const allCategories = [...new Set(tieredPrograms.map(p => p.category))].sort();

      const filterProgs = (list) => selectedCategory ? list.filter(p => p.category === selectedCategory) : list;
      const displayLikely = filterProgs(likelyPrograms);
      const displayMay    = filterProgs(mayPrograms);

      const SectionHeader = ({ tier, count }) => (
        <div style={{
          display: 'flex', alignItems: 'center', gap: 12, margin: '36px 0 20px',
          paddingBottom: 14, borderBottom: `2px solid ${tier === 'likely' ? 'var(--jade)' : 'var(--amber)'}`,
        }}>
          <div style={{
            width: 32, height: 32, borderRadius: 8, flexShrink: 0,
            background: tier === 'likely' ? 'var(--jade)' : 'var(--amber)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <Icon name={tier === 'likely' ? 'check' : 'spark'} size={15} color="white" />
          </div>
          <div>
            <h3 style={{ fontFamily: 'Fraunces, serif', fontSize: 18, fontWeight: 500, margin: 0, color: 'var(--text-primary)' }}>
              {tier === 'likely' ? 'Likely Eligible' : 'May Also Qualify'}
              <span style={{ fontFamily: 'Plus Jakarta Sans, sans-serif', fontSize: 13, fontWeight: 600, marginLeft: 10,
                color: tier === 'likely' ? 'var(--jade)' : 'var(--terracotta)' }}>
                {count} program{count !== 1 ? 's' : ''}
              </span>
            </h3>
            <p style={{ fontSize: 12, color: 'var(--text-muted)', margin: '3px 0 0', lineHeight: 1.4 }}>
              {tier === 'likely'
                ? 'Based on your answers, you appear to meet the eligibility criteria for these programs.'
                : 'You may qualify through criteria the quiz couldn\'t fully verify. Contact each program to confirm.'}
            </p>
          </div>
        </div>
      );

      return (
        <div id="main-content" style={{ background: "var(--cream)", minHeight: "calc(100vh - 64px)", padding: "40px 24px" }}>
          <div aria-live="polite" aria-atomic="true" className="sr-only" style={{ position: "absolute", left: "-9999px" }}>
            {tieredPrograms.length} programs found. {likelyPrograms.length} likely eligible, {mayPrograms.length} worth checking.
          </div>
          <div style={{ maxWidth: 1200, margin: "0 auto" }}>
            <div className="animate-fadeUp" style={{ marginBottom: 32 }}>
              <div className="tag tag-green" style={{ marginBottom: 12 }}><Icon name="check" size={12} aria-hidden="true" /> Your results are ready</div>
              <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 36, fontWeight: 500, letterSpacing: "-0.03em", lineHeight: 1.1, marginBottom: 8 }}>
                You may qualify for <em style={{ color: "var(--jade)", fontStyle: "italic" }}>{likelyPrograms.length} programs</em>
                {mayPrograms.length > 0 && <span style={{ fontSize: 22, color: 'var(--text-secondary)', fontStyle: 'normal' }}> + {mayPrograms.length} to check</span>}
              </h2>
              <p style={{ color: "var(--text-secondary)", fontSize: 15 }}>
                Based on your household of {householdSize} with annual income of ${annualIncome.toLocaleString()}
              </p>
            </div>

            <div className="disclaimer-box">
              <div className="disclaimer-title">⚠️ Important Disclaimer</div>
              These results are an estimate based on general eligibility criteria. Different programs define "household" and "income" differently and may have additional requirements. These results do not guarantee your eligibility. Please verify by contacting each program directly. Results are intentionally over-inclusive — we would rather show you a program you may not qualify for than miss one you do.
            </div>

            <div className="animate-fadeUp delay-1" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginBottom: 32 }}>
              {[
                { label: "Household size", val: householdSize },
                { label: "Annual income", val: `$${annualIncome.toLocaleString()}` },
                { label: "Likely eligible", val: likelyPrograms.length },
                { label: "Worth checking", val: mayPrograms.length },
              ].map(s => (
                <div key={s.label} className="stat-card animate-fadeUp">
                  <div className="stat-value">{s.val}</div>
                  <div className="stat-label">{s.label}</div>
                </div>
              ))}
            </div>

            {tieredPrograms.length === 0 ? (
              <div className="card" style={{ textAlign: "center", padding: "40px" }}>
                <p style={{ color: "var(--text-secondary)", marginBottom: 16 }}>Based on your answers, you may not currently qualify. However, you can:</p>
                <button className="btn-primary" onClick={() => setView("directory")}>
                  Browse all programs <Icon name="arrow" size={16} />
                </button>
              </div>
            ) : (
              <div>
                <div className="filter-buttons animate-fadeUp delay-1">
                  <button className={`filter-btn ${!selectedCategory ? 'active' : ''}`} onClick={() => setSelectedCategory(null)}>
                    All ({tieredPrograms.length})
                  </button>
                  {allCategories.map(cat => {
                    const count = tieredPrograms.filter(p => p.category === cat).length;
                    return (
                      <button key={cat} className={`filter-btn ${selectedCategory === cat ? 'active' : ''}`} onClick={() => setSelectedCategory(cat)}>
                        {cat.charAt(0).toUpperCase() + cat.slice(1)} ({count})
                      </button>
                    );
                  })}
                </div>

                {/* No results in selected category */}
                {selectedCategory && displayLikely.length === 0 && displayMay.length === 0 && (
                  <div style={{ textAlign: 'center', padding: '48px 24px', background: 'var(--warm-white)', borderRadius: 16, border: '1px solid var(--border)', marginTop: 24 }}>
                    <div style={{ fontSize: 32, marginBottom: 12 }}>🔍</div>
                    <h3 style={{ fontFamily: 'Fraunces, serif', fontSize: 20, fontWeight: 500, marginBottom: 8 }}>
                      No {selectedCategory} programs matched your answers
                    </h3>
                    <p style={{ color: 'var(--text-secondary)', fontSize: 14, marginBottom: 20, lineHeight: 1.6 }}>
                      You may still find helpful programs in other categories, or explore the full directory for more options.
                    </p>
                    <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
                      <button className="btn-secondary" onClick={() => setSelectedCategory(null)}>
                        View all my results
                      </button>
                      <button className="btn-primary" onClick={() => setView('directory')}>
                        Browse full directory <Icon name="arrow" size={14} aria-hidden="true" />
                      </button>
                    </div>
                  </div>
                )}

                {displayLikely.length > 0 && (
                  <div className="animate-fadeUp delay-2">
                    <SectionHeader tier="likely" count={displayLikely.length} />
                    <div className="results-grid">
                      {displayLikely.map(prog => <ProgramCard key={prog.id} prog={prog} householdSize={householdSize} tagVariant="green" />)}
                    </div>
                  </div>
                )}

                {displayMay.length > 0 && (
                  <div className="animate-fadeUp delay-3">
                    <SectionHeader tier="may" count={displayMay.length} />
                    <div className="results-grid">
                      {displayMay.map(prog => <ProgramCard key={prog.id} prog={prog} householdSize={householdSize} tagVariant="gray" />)}
                    </div>
                  </div>
                )}
              </div>
            )}

            <div style={{ marginTop: 40, display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }} className="no-print">
              <button className="btn-secondary" onClick={() => setView("landing")}>
                Start over
              </button>
              {tieredPrograms.length > 0 && (
                <button
                  className="btn-primary"
                  onClick={() => window.print()}
                  aria-label="Download or print your results"
                  style={{ gap: 8 }}
                >
                  <svg aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
                  Download / Print results
                </button>
              )}
              {tieredPrograms.length > 0 && (
                <button
                  className="btn-secondary"
                  onClick={() => setView('directory')}
                  aria-label="Browse all programs in the full directory"
                >
                  Explore full directory
                </button>
              )}
            </div>
          </div>
        </div>
      );
    };

    // Landing Page
    const LandingPage = ({ setView, goToDirectory }) => {
      const categories = [
        { cat: "Food", icon: "leaf", count: 6 },
        { cat: "Healthcare", icon: "heart", count: 15 },
        { cat: "Income", icon: "dollar", count: 13 },
        { cat: "Housing", icon: "home", count: 3 },
        { cat: "Utility", icon: "spark", count: 13 },
        { cat: "Transportation", icon: "spark", count: 2 },
        { cat: "Legal", icon: "file", count: 10 },
        { cat: "Day Care", icon: "heart", count: 3 },
        { cat: "Caretaker", icon: "heart", count: 3 },
        { cat: "Entertainment", icon: "spark", count: 16 },
        { cat: "Taxes", icon: "file", count: 2 },
      ];

      const howItWorks = [
        { n: "1", title: "Answer 6 quick questions", desc: "Tell us about your situation — about 3 minutes." },
        { n: "2", title: "Get personalized results", desc: "We find programs that match your specific needs." },
        { n: "3", title: "Apply today", desc: "Direct links to each program make applying easy." },
      ];

      return (
        <div className="hero-bg" style={{ minHeight: "100%" }}>
          <section style={{ maxWidth: 1120, margin: "0 auto", padding: "80px 24px 64px" }}>
            <div style={{ maxWidth: 640 }}>
              <div className="animate-fadeUp" style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "rgba(26,107,90,0.1)", border: "1px solid rgba(26,107,90,0.2)", borderRadius: 99, padding: "6px 14px", marginBottom: 24 }}>
                <Icon name="spark" size={14} color="var(--jade)" />
                <span style={{ fontSize: 13, fontWeight: 600, color: "var(--jade-dark)" }}>San Diego County • California</span>
              </div>
              <h1 className="animate-fadeUp delay-1" style={{ fontFamily: "Fraunces, serif", fontSize: "clamp(42px, 6vw, 72px)", fontWeight: 500, lineHeight: 1.05, letterSpacing: "-0.03em", marginBottom: 24 }}>
                Find the benefits<br />
                <em style={{ color: "var(--jade)", fontStyle: "italic" }}>you've earned.</em>
              </h1>
              <p className="animate-fadeUp delay-2" style={{ fontSize: 18, color: "var(--text-secondary)", lineHeight: 1.7, marginBottom: 36, maxWidth: 500 }}>
                Millions of eligible Americans miss out on public assistance because the system is overwhelming. We make it as simple as filing your taxes.
              </p>
              <div className="animate-fadeUp delay-3" style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                <button className="btn-primary" style={{ fontSize: 16, padding: "16px 32px" }} onClick={() => setView("quiz")}>
                  Start quiz <Icon name="arrow" size={16} />
                </button>
                <button className="btn-secondary" onClick={() => setView("directory")}>
                  Browse all 86 programs
                </button>
              </div>
            </div>
          </section>

          <section style={{ maxWidth: 1120, margin: "0 auto", padding: "0 24px 40px" }}>
            <div className="disclaimer-box">
              <div className="disclaimer-title">Important: About These Results</div>
              This tool provides an estimate of programs you may qualify for. Each program defines "household" and "income" differently and may have additional requirements. Results do not guarantee eligibility—verify directly with each program.
            </div>
          </section>

          <section style={{ maxWidth: 1120, margin: "0 auto", padding: "0 24px 80px" }}>
            <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 28, fontWeight: 500, marginBottom: 8 }}>Programs we check</h2>
            <p style={{ color: "var(--text-muted)", marginBottom: 32, fontSize: 15 }}>We search across 86 assistance programs in San Diego County.</p>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: 12 }}>
              {categories.map((c, i) => (
                <div key={c.cat} className="card card-hover animate-fadeUp" onClick={() => goToDirectory(c.cat.toLowerCase())} style={{ animationDelay: `${i * 0.06}s`, padding: 20, textAlign: "center", cursor: "pointer" }}>
                  <div style={{ width: 40, height: 40, borderRadius: 10, background: "rgba(26,107,90,0.1)", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 12, margin: "0 auto 12px" }}>
                    <Icon name={c.icon} size={18} color="var(--jade)" />
                  </div>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{c.cat}</div>
                  <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 4 }}>{c.count} programs</div>
                </div>
              ))}
            </div>
          </section>

          <section style={{ background: "var(--warm-white)", borderTop: "1px solid var(--border)", borderBottom: "1px solid var(--border)" }}>
            <div style={{ maxWidth: 1120, margin: "0 auto", padding: "72px 24px" }}>
              <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 28, fontWeight: 500, marginBottom: 48, textAlign: "center" }}>How it works</h2>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 32 }}>
                {howItWorks.map((s) => (
                  <div key={s.n} style={{ display: "flex", gap: 20 }}>
                    <div style={{ width: 44, height: 44, borderRadius: 12, background: "var(--jade)", color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Fraunces, serif", fontSize: 20, fontWeight: 500, flexShrink: 0 }}>{s.n}</div>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 6 }}>{s.title}</div>
                      <div style={{ fontSize: 14, color: "var(--text-secondary)", lineHeight: 1.6 }}>{s.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section style={{ maxWidth: 1120, margin: "0 auto", padding: "80px 24px", textAlign: "center" }}>
            <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 40, fontWeight: 500, marginBottom: 16, letterSpacing: "-0.03em" }}>
              Ready to discover your benefits?
            </h2>
            <p style={{ color: "var(--text-secondary)", fontSize: 16, marginBottom: 32 }}>Free, confidential, takes 3 minutes.</p>
            <button className="btn-primary" style={{ fontSize: 16, padding: "16px 40px" }} onClick={() => setView("quiz")}>
              Get started <Icon name="arrow" size={16} />
            </button>
            <p style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 16 }}>No account required. Your information is never sold.</p>
          </section>

          {/* Feedback nudge */}
          <section style={{ maxWidth: 1120, margin: "0 auto", padding: "0 24px 72px", textAlign: "center" }}>
            <p style={{ fontSize: 14, color: "var(--text-muted)" }}>
              Found this helpful?{" "}
              <a href="https://forms.gle/rdkBfhabyRp7Mf5Y9" target="_blank" rel="noopener noreferrer"
                style={{ color: "var(--jade)", fontWeight: 600, textDecoration: "none", borderBottom: "1.5px solid rgba(26,107,90,0.3)", paddingBottom: 1, transition: "border-color 0.2s" }}
                onMouseOver={e => e.currentTarget.style.borderColor = "var(--jade)"}
                onMouseOut={e => e.currentTarget.style.borderColor = "rgba(26,107,90,0.3)"}>
                Share your feedback →
              </a>
            </p>
          </section>
        </div>
      );
    };

    // Directory
    const Directory = ({ setView, initialCategory }) => {
      const [search, setSearch] = useState("");
      const [selectedCategory, setSelectedCategory] = useState(initialCategory || null);

      const categories = [...new Set(Object.values(PROGRAMS).map(p => p.category))].sort();
      const filtered = Object.values(PROGRAMS).filter(p => {
        const matchSearch = p.name.toLowerCase().includes(search.toLowerCase()) || p.description.toLowerCase().includes(search.toLowerCase());
        const matchCat = !selectedCategory || p.category === selectedCategory;
        return matchSearch && matchCat;
      });

      return (
        <div style={{ minHeight: "calc(100vh - 64px)", background: "var(--cream)", padding: "40px 24px" }}>
          <div style={{ maxWidth: 900, margin: "0 auto" }}>
            <div className="animate-fadeUp" style={{ marginBottom: 32 }}>
              <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 32, fontWeight: 500, marginBottom: 12 }}>Browse all 86 programs</h2>
              <p style={{ color: "var(--text-secondary)", fontSize: 15 }}>Explore all 86 assistance programs available in San Diego County.</p>
            </div>

            <div className="animate-fadeUp delay-1" style={{ marginBottom: 24 }}>
              <input className="input" placeholder="Search programs..." value={search} onChange={e => setSearch(e.target.value)} style={{ marginBottom: 16 }} />
            </div>

            <div className="animate-fadeUp delay-2" style={{ marginBottom: 24, display: "flex", gap: 8, flexWrap: "wrap" }}>
              {categories.map(cat => (
                <button key={cat} onClick={() => setSelectedCategory(selectedCategory === cat ? null : cat)} style={{ background: selectedCategory === cat ? "var(--jade)" : "var(--warm-white)", color: selectedCategory === cat ? "white" : "var(--text-secondary)", border: selectedCategory === cat ? "none" : "1px solid var(--border)", padding: "8px 16px", borderRadius: 99, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "Plus Jakarta Sans" }}>
                  {cat}
                </button>
              ))}
            </div>

            <div className="results-grid">
              {filtered.map((prog, i) => (
                <div key={prog.id} className="animate-fadeUp" style={{ animationDelay: `${(i % 5) * 0.1}s` }}>
                  <ProgramCard prog={prog} householdSize={null} tagVariant="gray" />
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // About Us
    const AboutUs = ({ setView }) => {
      const sections = [
        {
          icon: "spark",
          label: "Vision",
          color: "var(--jade)",
          bg: "rgba(26,107,90,0.08)",
          content: "Everyone receives the support they need."
        },
        {
          icon: "leaf",
          label: "Mission",
          color: "var(--jade)",
          bg: "rgba(26,107,90,0.06)",
          content: "The mission of Public Programs Foundation is to enrich the lives of children and adults by empowering users with access to information that secures equitable housing support, healthcare, and the prevention of food insecurity."
        }
      ];

      return (
        <div style={{ minHeight: "calc(100vh - 64px)", background: "var(--cream)" }}>
          {/* Hero */}
          <div style={{ background: "radial-gradient(ellipse 80% 60% at 60% -10%, rgba(26,107,90,0.12) 0%, transparent 60%), var(--cream)", padding: "64px 24px 48px", textAlign: "center", borderBottom: "1px solid var(--border)" }}>
            <div className="animate-fadeUp" style={{ maxWidth: 680, margin: "0 auto" }}>
              <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "rgba(26,107,90,0.1)", borderRadius: 99, padding: "6px 16px", marginBottom: 24 }}>
                <Icon name="leaf" size={14} color="var(--jade)" />
                <span style={{ fontSize: 13, fontWeight: 600, color: "var(--jade-dark)" }}>Public Programs Foundation</span>
              </div>
              <h1 style={{ fontFamily: "Fraunces, serif", fontSize: "clamp(36px, 6vw, 54px)", fontWeight: 500, lineHeight: 1.1, letterSpacing: "-0.03em", marginBottom: 20, color: "var(--text-primary)" }}>
                About <em style={{ fontStyle: "italic", color: "var(--jade)" }}>Us</em>
              </h1>
              <p style={{ fontSize: 17, color: "var(--text-secondary)", lineHeight: 1.7, maxWidth: 560, margin: "0 auto" }}>
                We build tools that connect people with the programs they've earned — freely, privately, and without barriers.
              </p>
            </div>
          </div>

          <div style={{ maxWidth: 760, margin: "0 auto", padding: "56px 24px 80px" }}>

            {/* Vision & Mission */}
            <div className="animate-fadeUp" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 20, marginBottom: 48 }}>
              {sections.map(s => (
                <div key={s.label} style={{ background: s.bg, border: "1px solid rgba(26,107,90,0.15)", borderRadius: 16, padding: 28 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                    <div style={{ width: 36, height: 36, borderRadius: 10, background: "rgba(26,107,90,0.15)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <Icon name={s.icon} size={18} color="var(--jade)" />
                    </div>
                    <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--jade-dark)" }}>{s.label}</span>
                  </div>
                  <p style={{ fontSize: 15.5, lineHeight: 1.65, color: "var(--text-primary)", fontStyle: s.label === "Vision" ? "italic" : "normal", fontFamily: s.label === "Vision" ? "Fraunces, serif" : "inherit", fontWeight: s.label === "Vision" ? 500 : 400 }}>
                    {s.content}
                  </p>
                </div>
              ))}
            </div>

            {/* Our Story */}
            <div className="animate-fadeUp delay-1" style={{ marginBottom: 40 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18 }}>
                <div style={{ width: 40, height: 40, borderRadius: 12, background: "rgba(196,98,45,0.1)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Icon name="file" size={20} color="var(--terracotta)" />
                </div>
                <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 26, fontWeight: 500, color: "var(--text-primary)" }}>Our Story</h2>
              </div>
              <div style={{ background: "var(--warm-white)", border: "1px solid var(--border)", borderRadius: 16, padding: 28, lineHeight: 1.75, color: "var(--text-secondary)", fontSize: 15 }}>
                <p>When Public Programs Foundation founder, <strong style={{ color: "var(--text-primary)" }}>Ashley L. Salas</strong>, looked for a list of programs that community members could rely on in their times of need, she didn't find it easily. She asked around, and no one knew of such a list. So she founded Public Programs Foundation to build it.</p>
                <p style={{ marginTop: 16 }}>We know we are missing programs. If you know of programs that are not yet on the Benefits Navigator, please email us at <a href="mailto:info@public-programs.org" style={{ color: "var(--jade)", fontWeight: 600, textDecoration: "none" }}>info@public-programs.org</a>, and we'll add them.</p>
                <p style={{ marginTop: 16 }}>We are starting in <strong style={{ color: "var(--text-primary)" }}>San Diego, California, United States</strong>, because that is where we are, but our goal is for the Benefits Navigator to serve every county, state, and US territory.</p>
              </div>
            </div>

            {/* Your Privacy */}
            <div className="animate-fadeUp delay-1" style={{ marginBottom: 40 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18 }}>
                <div style={{ width: 40, height: 40, borderRadius: 12, background: "rgba(232,168,48,0.12)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Icon name="check" size={20} color="var(--amber)" />
                </div>
                <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 26, fontWeight: 500, color: "var(--text-primary)" }}>Your Privacy</h2>
              </div>
              <div style={{ background: "rgba(232,168,48,0.06)", border: "1px solid rgba(232,168,48,0.25)", borderLeft: "4px solid var(--amber)", borderRadius: 12, padding: 24, fontSize: 15, lineHeight: 1.75, color: "var(--text-secondary)" }}>
                Your information is <strong style={{ color: "var(--text-primary)" }}>confidential and never stored, shared, or sold.</strong> We use your answers only to show you matching programs in this session. No data is collected or retained after you leave the Benefits Navigator.
              </div>
            </div>

            {/* Accessibility */}
            <div className="animate-fadeUp delay-1" style={{ marginBottom: 40 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18 }}>
                <div style={{ width: 40, height: 40, borderRadius: 12, background: "rgba(26,107,90,0.1)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Icon name="heart" size={20} color="var(--jade)" />
                </div>
                <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 26, fontWeight: 500, color: "var(--text-primary)" }}>Accessibility</h2>
              </div>
              <p style={{ fontSize: 15, color: "var(--text-secondary)", marginBottom: 16, lineHeight: 1.6 }}>The Benefits Navigator is designed to be accessible to everyone:</p>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 14 }}>
                {[
                  { icon: "dollar", title: "Free to use", desc: "No cost, no account required" },
                  { icon: "home", title: "Mobile-friendly", desc: "Works on phones, tablets, and computers" },
                  { icon: "leaf", title: "Available in English", desc: "With plans to add more languages" },
                  { icon: "spark", title: "Comprehensive", desc: "80+ programs and growing" },
                ].map(item => (
                  <div key={item.title} style={{ background: "var(--warm-white)", border: "1px solid var(--border)", borderRadius: 12, padding: 18, display: "flex", gap: 14, alignItems: "flex-start" }}>
                    <div style={{ width: 32, height: 32, borderRadius: 8, background: "rgba(26,107,90,0.1)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      <Icon name={item.icon} size={16} color="var(--jade)" />
                    </div>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 13.5, color: "var(--text-primary)", marginBottom: 3 }}>{item.title}</div>
                      <div style={{ fontSize: 12.5, color: "var(--text-secondary)", lineHeight: 1.5 }}>{item.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* How You Can Help */}
            <div className="animate-fadeUp delay-2" style={{ marginBottom: 40 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18 }}>
                <div style={{ width: 40, height: 40, borderRadius: 12, background: "rgba(26,107,90,0.1)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Icon name="arrow" size={20} color="var(--jade)" />
                </div>
                <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 26, fontWeight: 500, color: "var(--text-primary)" }}>How You Can Help</h2>
              </div>
              <p style={{ fontSize: 15, color: "var(--text-secondary)", marginBottom: 16, lineHeight: 1.6 }}>There are several ways you can support our mission:</p>
              <div style={{ background: "var(--warm-white)", border: "1px solid var(--border)", borderRadius: 16, overflow: "hidden" }}>
                {[
                  { label: "Share the tool", desc: "Tell someone in your community who might benefit" },
                  { label: "Report missing programs", desc: <span>Email us at <a href="mailto:info@public-programs.org" style={{ color: "var(--jade)", fontWeight: 600, textDecoration: "none" }}>info@public-programs.org</a> with programs we should include</span> },
                  { label: "Share feedback", desc: <span>Let us know how we can improve — <a href="https://forms.gle/rdkBfhabyRp7Mf5Y9" target="_blank" rel="noopener noreferrer" style={{ color: "var(--jade)", fontWeight: 600, textDecoration: "none", borderBottom: "1.5px solid rgba(26,107,90,0.3)", paddingBottom: 1 }}>fill out our feedback form</a></span> },
                  { label: "Spread the word", desc: "Help us reach more people who need this resource" },
                ].map((item, i, arr) => (
                  <div key={item.label} style={{ padding: "18px 22px", borderBottom: i < arr.length - 1 ? "1px solid var(--border)" : "none", display: "flex", gap: 14, alignItems: "flex-start" }}>
                    <div style={{ width: 8, height: 8, borderRadius: "50%", background: "var(--jade)", marginTop: 7, flexShrink: 0 }} />
                    <div>
                      <span style={{ fontWeight: 700, fontSize: 14, color: "var(--text-primary)" }}>{item.label}</span>
                      <span style={{ fontSize: 14, color: "var(--text-secondary)" }}> — {item.desc}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Get in Touch */}
            <div className="animate-fadeUp delay-3">
              <div style={{ background: "linear-gradient(135deg, var(--jade-dark) 0%, var(--jade) 100%)", borderRadius: 20, padding: "40px 36px", textAlign: "center", color: "white" }}>
                <div style={{ width: 48, height: 48, borderRadius: 14, background: "rgba(255,255,255,0.15)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px" }}>
                  <Icon name="spark" size={24} color="white" />
                </div>
                <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 28, fontWeight: 500, marginBottom: 12, letterSpacing: "-0.02em" }}>Get in Touch</h2>
                <p style={{ fontSize: 15, opacity: 0.85, lineHeight: 1.65, marginBottom: 28, maxWidth: 440, margin: "0 auto 28px" }}>
                  Have questions or want to contribute? We would love to hear from you.
                </p>
                <a href="mailto:info@public-programs.org" style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "white", color: "var(--jade-dark)", borderRadius: 99, padding: "14px 28px", fontWeight: 700, fontSize: 15, textDecoration: "none", fontFamily: "Plus Jakarta Sans, sans-serif" }}>
                  <Icon name="arrow" size={15} color="var(--jade-dark)" />
                  info@public-programs.org
                </a>
              </div>
            </div>

          </div>
        </div>
      );
    };

    // Nav
    const Nav = ({ view, setView }) => (
      <nav className="nav">
        <div className="nav-inner" style={{ justifyContent: "space-between" }}>
          <button onClick={() => setView("landing")} className="btn-ghost" aria-label="Benefits Navigator home" style={{ padding: 0, display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 32, height: 32, background: "var(--jade)", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon name="leaf" size={16} color="white" />
            </div>
            <span style={{ fontFamily: "Fraunces, serif", fontWeight: 500, fontSize: 17, color: "var(--text-primary)" }}>
              Benefits <em style={{ fontStyle: "italic" }}>Navigator</em>
            </span>
          </button>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <a href="https://forms.gle/rdkBfhabyRp7Mf5Y9" target="_blank" rel="noopener noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 6, background: "rgba(26,107,90,0.08)", color: "var(--jade)", border: "1.5px solid rgba(26,107,90,0.2)", borderRadius: 99, padding: "7px 16px", fontSize: 13.5, fontWeight: 600, textDecoration: "none", fontFamily: "Plus Jakarta Sans, sans-serif", transition: "all 0.2s ease" }}
              onMouseOver={e => { e.currentTarget.style.background = "rgba(26,107,90,0.14)"; e.currentTarget.style.borderColor = "var(--jade)"; }}
              onMouseOut={e => { e.currentTarget.style.background = "rgba(26,107,90,0.08)"; e.currentTarget.style.borderColor = "rgba(26,107,90,0.2)"; }}
              aria-label="Share feedback via Google Form">
              Share Feedback
            </a>
            <button onClick={() => setView("about")} className="btn-ghost" style={{ fontSize: 14, fontWeight: 600, color: view === "about" ? "var(--jade)" : "var(--text-secondary)" }} aria-label="About Us page">
              About Us
            </button>
          </div>
        </div>
      </nav>
    );

    function App() {
      const [view, setView] = useState("landing");
      const [answers, setAnswers] = useState(null);
      const [directoryCategory, setDirectoryCategory] = useState(null);

      const goToDirectory = (category = null) => {
        setDirectoryCategory(category);
        setView("directory");
      };

      return (
        <div>
          <Nav view={view} setView={setView} />
          {view === "landing" && <LandingPage setView={setView} goToDirectory={goToDirectory} />}
          {view === "quiz" && <Quiz setView={setView} setAnswers={setAnswers} />}
          {view === "results" && answers && <Results answers={answers} setView={setView} />}
          {view === "directory" && <Directory key={directoryCategory} setView={setView} initialCategory={directoryCategory} />}
          {view === "about" && <AboutUs setView={setView} />}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
