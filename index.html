    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {

      --jade-dark: #0f4038;
      --cream: #faf6ef;
      --warm-white: #fffdf9;
      --terracotta: #c4622d;
      --amber: #e8a830;
      --sand: #e8dcc8;
      --sand-dark: #cfc0a6;
      --text-primary: #1c1a17;
      --text-secondary: #5c5649;
      --text-muted: #9a9082;
      --border: #e0d6c6;
      --shadow-sm: 0 1px 4px rgba(28,26,23,0.08);
      --shadow-md: 0 4px 20px rgba(28,26,23,0.12);
      --shadow-lg: 0 12px 48px rgba(28,26,23,0.16);

    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--cream); color: var(--text-primary); }
    h1, h2, h3 { font-family: 'Fraunces', serif; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeUp { animation: fadeUp 0.5s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: var(--jade); color: white; border: none; border-radius: 99px; padding: 14px 28px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-family: 'Plus Jakarta Sans', sans-serif; }
    .btn-primary:hover { background: var(--jade-light); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-secondary { display: inline-flex; align-items: center; gap: 8px; background: transparent; color: var(--jade); border: 1.5px solid var(--jade); border-radius: 99px; padding: 13px 24px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-family: 'Plus Jakarta Sans', sans-serif; }
    .btn-secondary:hover { background: rgba(26,107,90,0.06); }
    .btn-ghost { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; font-weight: 500; padding: 8px 12px; border-radius: 6px; transition: color 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; }
    .btn-ghost:hover { color: var(--text-primary); }
    .nav { position: sticky; top: 0; z-index: 100; background: rgba(250,246,239,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .nav-inner { max-width: 1120px; margin: 0 auto; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .tag { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; }
    .tag-green { background: rgba(26,107,90,0.1); color: var(--jade-dark); }
    .tag-gray { background: var(--sand); color: var(--text-secondary); }
    .input { width: 100%; background: var(--warm-white); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 16px; font-size: 15px; color: var(--text-primary); font-family: 'Plus Jakarta Sans', sans-serif; outline: none; }
    .input:focus { border-color: var(--jade); box-shadow: 0 0 0 3px rgba(26,107,90,0.1); }
    .choice-card { border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.2s ease; background: var(--warm-white); display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 500; }
    .choice-card:hover { border-color: var(--jade); background: rgba(26,107,90,0.03); }
    .choice-card.selected { border-color: var(--jade); background: rgba(26,107,90,0.07); color: var(--jade-dark); }
    .choice-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .choice-card.selected .choice-dot { border-color: var(--jade); background: var(--jade); }
    .progress-track { width: 100%; height: 6px; background: var(--sand); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--jade), var(--jade-light)); border-radius: 99px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
    .hero-bg { background: radial-gradient(ellipse 80% 60% at 60% -10%, rgba(26,107,90,0.12) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 0% 80%, rgba(232,168,48,0.1) 0%, transparent 50%), var(--cream); }
    .stat-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; }
    .stat-value { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 500; color: var(--text-primary); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
    .info-box { background: rgba(26,107,90,0.07); border: 1px solid rgba(26,107,90,0.2); border-radius: 10px; padding: 14px 16px; font-size: 13.5px; color: var(--jade-dark); line-height: 1.6; }
    .disclaimer-box { background: rgba(232,168,48,0.08); border-left: 4px solid var(--amber); padding: 16px; border-radius: 8px; font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin: 24px 0; }
    .disclaimer-title { font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .program-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: var(--shadow-sm); transition: all 0.25s ease; display: flex; flex-direction: column; height: 100%; }
    .program-card:hover { box-shadow: var(--shadow-md); transform: translateY(-4px); border-color: var(--jade); }
    .program-card-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(26,107,90,0.1); display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .program-card-title { font-weight: 700; font-size: 15px; margin-bottom: 8px; line-height: 1.3; }
    .program-card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 12px; flex-grow: 1; }
    .program-card-cat { margin-bottom: 12px; }
    .program-card-link { margin-top: auto; }
    .filter-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .filter-btn { background: var(--warm-white); color: var(--text-secondary); border: 1px solid var(--border); padding: 8px 16px; border-radius: 99px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; }
    .filter-btn:hover { border-color: var(--jade); background: rgba(26,107,90,0.03); }
    .filter-btn.active { background: var(--jade); color: white; border-color: var(--jade); }
    .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: var(--shadow-sm); }
    .card-hover { transition: all 0.2s ease; cursor: pointer; }
    .card-hover:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--jade); }

      const isMultiSelect = current.id === "special_status";

      const handleOptionClick = (opt) => {
        if (isMultiSelect) {
          // Toggle multiple selection
          setSelectedMultiple(prev =>

              ? prev.filter(item => item !== opt)

        } else {
          // Single selection
          setSelected(opt);
        }
      };

      const handleNext = () => {
        const newAnswers = isMultiSelect 
          ? { ...answers, [current.id]: selectedMultiple }
          : { ...answers, [current.id]: selected };
        
        if (isMultiSelect && selectedMultiple.length === 0) return;
        if (!isMultiSelect && !selected) return;
        
        setLocalAnswers(newAnswers);
        
        if (step < quizSteps.length - 1) {
          setStep(step + 1);
          setSelected(null);
          setSelectedMultiple([]);
        } else {
          setAnswers(newAnswers);
          setView("results");
        }
      };

      const handleBack = () => {
        if (step === 0) { setView("landing"); return; }
        setStep(step - 1);
        const prevAnswer = answers[quizSteps[step - 1].id];
        if (quizSteps[step - 1].id === "special_status") {
          setSelectedMultiple(Array.isArray(prevAnswer) ? prevAnswer : []);
          setSelected(null);

          setSelected(prevAnswer || null);

          }
        }
        
        // Exclude senior programs for non-seniors
        if (age !== "65+" && [31, 32, 55, 71].includes(prog.id)) return false;
        
        // Child/family programs
        if ((hasChildren || isPregnant) && [24, 28, 35, 36, 37, 38, 39, 40, 41, 43, 45, 56, 57].includes(prog.id)) {

        } else if ((hasChildren || isPregnant) === false && [24, 28, 35, 36, 43, 56, 57].includes(prog.id)) {
          return false;
        }
        
        // Veteran programs

          // Keep these
        } else if (!isVeteran && [49, 61, 73].includes(prog.id)) {
          return false;
        }
        
        // Refugee programs
        if (isRefugee && [8, 42, 48].includes(prog.id)) {
          // Keep these
        } else if (!isRefugee && [48].includes(prog.id)) {
          return false;
        }
        
        // Disability programs
        if (isDisabled && [3, 4, 10, 25, 26, 29, 33, 39, 45, 46, 47, 53, 73].includes(prog.id)) {
          // Keep these
        } else if (!isDisabled && [26, 33, 53].includes(prog.id)) {
          return false;
        }
        
        // Income threshold checks
        if (monthlyIncome > 6500) {

          if ([1, 5, 6, 7, 8, 9, 10, 11, 12, 14, 15, 16, 17, 18, 21, 22, 23, 24, 31, 32, 34, 35, 36, 37, 39, 40, 41].includes(prog.id)) {

        // Unemployed programs

          if ([2, 13].includes(prog.id) && monthlyIncome > 2500) return false;

        // General income-based filtering
        if (monthlyIncome > 5500 && prog.category === "food") return false;
        if (monthlyIncome > 5000 && prog.category === "utility") return false;
        
        return true;
      });

                  key={cat}
                  onClick={() => setSelectedCategory(selectedCategory === cat ? null : cat)}
                  style={{ background: selectedCategory === cat ? "var(--jade)" : "var(--warm-white)", color: selectedCategory === cat ? "white" : "var(--text-secondary)", border: selectedCategory === cat ? "none" : "1px solid var(--border)", padding: "8px 16px", borderRadius: 99, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "Plus Jakarta Sans" }}
                >
                  {cat}
                </button>
              ))}
            </div>

            <div className="results-grid">
              {filtered.map((prog, i) => (
                <div key={prog.id} className="program-card animate-fadeUp" style={{ animationDelay: `${(i % 5) * 0.1}s` }}>
                  <div className="program-card-icon">
                    <Icon name={prog.icon} size={24} color="var(--jade)" />
                  </div>
                  <div className="program-card-title">{prog.name}</div>
                  <div className="program-card-desc">{prog.description}</div>
                  <div className="program-card-cat">
                    <span className="tag tag-gray">{prog.category}</span>
                  </div>
                  <div className="program-card-link">
                    <a href={prog.link} target="_blank" rel="noreferrer" style={{ textDecoration: "none" }}>
                      <button className="btn-primary" style={{ fontSize: 12, padding: "8px 16px", width: "100%" }}>
                        Learn more <Icon name="arrow" size={12} />
                      </button>
                    </a>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // Nav
    const Nav = ({ view, setView }) => (
      <nav className="nav">
        <div className="nav-inner">
          <button onClick={() => setView("landing")} className="btn-ghost" style={{ padding: 0, display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 32, height: 32, background: "var(--jade)", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon name="leaf" size={16} color="white" />
            </div>
            <span style={{ fontFamily: "Fraunces, serif", fontWeight: 500, fontSize: 17, color: "var(--text-primary)" }}>
              Benefits <em style={{ fontStyle: "italic" }}>Navigator</em>
            </span>
          </button>
        </div>
      </nav>
    );

    // TODO: Import @vercel/analytics/react when a bundler is added to the project
    // import { Analytics } from '@vercel/analytics/react';

    // App
    function App() {
      const [view, setView] = useState("landing");
      const [answers, setAnswers] = useState(null);

      return (
        <div>
          <Nav view={view} setView={setView} />
          {view === "landing" && <LandingPage setView={setView} />}
          {view === "quiz" && <Quiz setView={setView} setAnswers={setAnswers} />}
          {view === "results" && answers && <Results answers={answers} setView={setView} />}
          {view === "directory" && <Directory setView={setView} />}
          {/* TODO: Render Vercel Analytics component once imported */}
          {/* <Analytics /> */}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
